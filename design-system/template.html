<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRINK Admin · 페이지 템플릿</title>
<link rel="stylesheet" href="vrink-admin-ds.css">
</head>
<body>
<div class="layout">

  <!-- ═══════════ SIDEBAR ═══════════ -->
  <aside class="sidebar">
    <div class="sidebar-logo" onclick="location.href='#'">
      <strong style="font-size:20px;color:var(--color-primary);letter-spacing:-.5px;">VRINK</strong>
    </div>

    <nav class="sidebar-nav">
      <!-- 단일 항목 -->
      <a href="#" class="nav-item active">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg></span>
        <span class="nav-label">홈</span>
      </a>
      <a href="#" class="nav-item">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.61L23 6H6"/></svg></span>
        <span class="nav-label">자사몰</span>
      </a>

      <!-- 접히는 그룹 (열림 상태) -->
      <div class="nav-group">
        <div class="nav-group-trigger open" onclick="toggleGroup(this)">
          <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v2"/></svg></span>
          <span class="nav-label">지점 관리</span>
          <span class="nav-arrow">▾</span>
        </div>
        <div class="nav-sub show">
          <a href="#" class="nav-sub-item">지점 목록</a>
          <a href="#" class="nav-sub-item active">재고 관리</a>
          <a href="#" class="nav-sub-item">키오스크</a>
          <a href="#" class="nav-sub-item">디바이스</a>
        </div>
      </div>

      <!-- 접히는 그룹 (닫힘 상태) -->
      <div class="nav-group">
        <div class="nav-group-trigger" onclick="toggleGroup(this)">
          <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
          <span class="nav-label">주문 / 매출</span>
          <span class="nav-arrow">▾</span>
        </div>
        <div class="nav-sub">
          <a href="#" class="nav-sub-item">주문 내역</a>
          <a href="#" class="nav-sub-item">종합 매출</a>
        </div>
      </div>

      <div class="nav-group">
        <div class="nav-group-trigger" onclick="toggleGroup(this)">
          <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span>
          <span class="nav-label">회원 · 마케팅</span>
          <span class="nav-arrow">▾</span>
        </div>
        <div class="nav-sub">
          <a href="#" class="nav-sub-item">회원 목록</a>
          <a href="#" class="nav-sub-item">프로모션</a>
        </div>
      </div>
    </nav>

    <!-- 하단 고정 영역 -->
    <div class="sidebar-bottom">
      <div class="sidebar-section-title">SETTINGS</div>
      <a href="#" class="nav-item">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 11-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 11-2.83-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 112.83-2.83l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 112.83 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span>
        <span class="nav-label">설정</span>
      </a>
      <button class="nav-item nav-logout" style="background:none;border:none;width:100%;text-align:left;cursor:pointer;">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
        <span class="nav-label">로그아웃</span>
      </button>
    </div>
  </aside>

  <!-- ═══════════ MAIN ═══════════ -->
  <div class="main-wrapper">

    <!-- TOPBAR -->
    <header class="topbar">
      <button class="topbar-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0" stroke="#505050" stroke-width="1.5" stroke-linecap="round"/></svg>
        <span class="notif-badge">2</span>
      </button>
      <button class="topbar-branch">빌드업 성수점 ▾</button>
      <div class="topbar-user">
        <div class="user-avatar">A</div>
        <div class="user-info">
          <span class="user-name">admin</span>
          <span class="user-role">관리자</span>
        </div>
        <span style="color:var(--text-muted);font-size:11px;">▾</span>
      </div>
    </header>

    <!-- PAGE CONTENT -->
    <div class="page-content">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;">
        <div class="page-title" style="margin-bottom:0;">재고 관리</div>
        <button class="btn btn-primary">+ 품목 추가</button>
      </div>

      <!-- 여기에 페이지 내용을 넣으세요 -->
      <div class="table-wrap">
        <table>
          <thead><tr><th>지점</th><th>품목</th><th>재고</th><th>상태</th></tr></thead>
          <tbody>
            <tr><td>빌드업 강남점</td><td>단백질 파우더</td><td>82%</td><td><span class="badge badge-success">정상</span></td></tr>
            <tr><td>빌드업 성수점</td><td>비타민 원액</td><td>12%</td><td><span class="badge badge-warning">부족</span></td></tr>
            <tr><td>빌드업 서대문점</td><td>아미노 원액</td><td>0%</td><td><span class="badge badge-error">소진</span></td></tr>
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<script>
  // 사이드바 그룹 펼침/접힘
  function toggleGroup(el){
    el.classList.toggle('open');
    var s = el.nextElementSibling;
    if (s) s.classList.toggle('show');
  }
</script>
</body>
</html>
