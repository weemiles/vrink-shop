<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주문 완료 — VRINK 관리자</title>
  <style>
    @font-face { font-family: 'Pretendard'; font-weight: 400; src: url('pretendard/Pretendard-Regular.woff2') format('woff2'); }
    @font-face { font-family: 'Pretendard'; font-weight: 500; src: url('pretendard/Pretendard-Medium.woff2') format('woff2'); }
    @font-face { font-family: 'Pretendard'; font-weight: 700; src: url('pretendard/Pretendard-Bold.woff2') format('woff2'); }
  </style>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; line-height: 1.2; }

    :root {
      --cta:    #66A6FF;
      --cta-h:  #4d93f5;
      --red:    #ec3d3d;
      --text:   #111111;
      --sub:    #505050;
      --muted:  #888;
      --bg:     #f8f8fa;
      --border: #ebebeb;
    }

    body {
      font-family: Pretendard, sans-serif;
      background: #f5f6fa;
      display: flex;
      height: 100vh;
      overflow: visible;
      color: var(--text);
    }

    /* ═══════════════ SIDEBAR ═══════════════ */
    .sidebar {
      width: 256px; min-width: 256px; height: 100vh;
      background: #fff; border-right: 1px solid rgba(0,0,0,0.08);
      display: flex; flex-direction: column;
      padding: 24px; gap: 20px;
    }
    .logo { display: flex; align-items: center; gap: 8px; height: 28px; }
    .logo-mark {
      width: 28px; height: 28px; background: var(--red);
      border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .logo-mark svg { width: 14px; height: 14px; }
    .logo-text { font-family: Pretendard, sans-serif; font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
    .divider { height: 2px; background: #f6f6f6; border-radius: 2px; flex-shrink: 0; }
    .nav { display: flex; flex-direction: column; gap: 2px; }
    .nav-lbl-sm { font-size: 10px; font-weight: 600; letter-spacing: .5px; text-transform: uppercase; color: var(--muted); padding: 6px 12px 4px; }
    .nav-item {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 12px; border-radius: 8px; cursor: pointer; text-decoration: none;
      transition: background .15s;
    }
    .nav-item:hover { background: #f6f6f6; }
    .nav-item.shop-active { background: #eff6ff; }
    .nav-item.shop-active .nav-name { color: var(--cta); font-weight: 700; }
    .nav-item.logout .nav-name { color: var(--red); }
    .nav-icon { width: 20px; height: 20px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .nav-name { flex: 1; font-size: 14px; font-weight: 500; letter-spacing: -0.28px; color: var(--muted); line-height: 20px; }
    .nav-chev { width: 16px; height: 16px; flex-shrink: 0; color: #ccc; }

    /* ═══════════════ MAIN ═══════════════ */
    .main { flex: 1; display: flex; flex-direction: column; overflow: visible; }

    .header {
      height: 64px; background: #fff; border-bottom: 1px solid #f0f0f0;
      display: flex; align-items: center; justify-content: flex-end;
      padding: 0 36px; gap: 20px; flex-shrink: 0;
    }
    .hdr-notif { position: relative; cursor: pointer; width: 24px; height: 28px; }
    .hdr-badge {
      position: absolute; top: -1px; right: -3px;
      width: 16px; height: 16px; background: var(--red); border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: Pretendard, sans-serif; font-size: 10px; font-weight: 700; color: #fff;
    }
    .hdr-branch { display: flex; align-items: center; gap: 6px; cursor: pointer; }
    .hdr-branch span { font-family: Pretendard, sans-serif; font-size: 14px; font-weight: 600; color: #646464; }
    .hdr-user { display: flex; align-items: center; gap: 10px; }
    .hdr-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg,#667eea,#764ba2);
      display: flex; align-items: center; justify-content: center;
      font-family: Pretendard, sans-serif; font-weight: 700; font-size: 13px; color: #fff;
    }
    .hdr-info { display: flex; flex-direction: column; }
    .hdr-name { font-family: Pretendard, sans-serif; font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.3; }
    .hdr-role { font-family: Pretendard, sans-serif; font-size: 12px; font-weight: 500; color: #565656; }

    /* ═══════════════ CONTENT ═══════════════ */
    .content { flex: 1; overflow-y: auto; background: #fff; display: flex; align-items: flex-start; justify-content: center; }

    /* ═══════════════ CONFIRM CARD ═══════════════ */
    .confirm-wrap {
      width: 100%; max-width: 480px;
      padding: 40px 20px;
      margin: 0 auto;
    }

    /* 체크 아이콘 — 초록 채운 원 + 흰 체크 */
    .check-circle {
      width: 60px; height: 60px; border-radius: 50%;
      background: #22c55e;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 22px;
    }
    .check-circle svg { width: 28px; height: 28px; }

    .confirm-title {
      font-size: 20px; font-weight: 700; color: var(--text);
      text-align: center; margin-bottom: 6px;
    }
    .confirm-sub {
      font-size: 13px; color: var(--muted);
      text-align: center; margin-bottom: 32px; line-height: 1.7;
    }

    /* 주문 정보 카드 */
    .order-card {
      border: 1px solid var(--border);
      border-radius: 10px; overflow: visible; margin-bottom: 12px;
    }
    .order-card-head {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .order-card-head-lbl { font-size: 12px; font-weight: 600; color: var(--muted); }
    .order-meta { display: flex; align-items: center; gap: 10px; }
    .order-date { font-family: Pretendard, sans-serif; font-size: 12px; color: var(--muted); }
    .order-id { font-family: Pretendard, sans-serif; font-size: 12px; font-weight: 600; color: var(--sub); }

    .order-items { padding: 0 18px; }
    .order-item-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 0; border-bottom: 1px solid #f4f4f4; gap: 12px;
    }
    .order-item-row:last-child { border-bottom: none; }
    .oi-info { flex: 1; }
    .oi-name { font-size: 14px; font-weight: 600; color: var(--text); }
    .oi-spec { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .oi-qty { font-family: Pretendard, sans-serif; font-size: 13px; color: var(--muted); }
    .oi-price { font-family: Pretendard, sans-serif; font-size: 14px; font-weight: 700; color: var(--text); white-space: nowrap; }

    /* 합계 */
    .order-total-wrap {
      border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 18px; margin-bottom: 20px;
    }
    .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
    .total-row:last-child { margin-bottom: 0; }
    .total-lbl { font-size: 13px; color: var(--muted); }
    .total-val { font-family: Pretendard, sans-serif; font-size: 13px; font-weight: 500; color: var(--sub); }
    .total-divider { height: 1px; background: var(--border); margin: 10px 0; }
    .total-lbl-big { font-size: 14px; font-weight: 700; color: var(--text); }
    .total-val-big { font-family: Pretendard, sans-serif; font-size: 20px; font-weight: bold; color: var(--cta); }

    /* 배송 안내 */
    .delivery-card {
      border: 1px solid var(--border);
      border-radius: 10px; padding: 16px 18px; margin-bottom: 24px;
    }
    .delivery-title { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; letter-spacing: .2px; text-transform: uppercase; }
    .delivery-desc { font-size: 13px; color: var(--sub); line-height: 1.9; }

    /* 버튼 */
    .btn-group { display: flex; gap: 10px; }
    .btn-back {
      flex: 1; padding: 13px;
      background: #fff; color: var(--sub); border: 1px solid var(--border);
      border-radius: 8px; font-family: Pretendard, sans-serif;
      font-size: 14px; font-weight: 600; cursor: pointer; text-align: center;
      transition: background .15s; text-decoration: none;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-back:hover { background: var(--bg); }
    .btn-history {
      flex: 1; padding: 13px;
      background: var(--cta); color: #fff; border: none;
      border-radius: 8px; font-family: Pretendard, sans-serif;
      font-size: 14px; font-weight: 700; cursor: pointer;
      transition: background .15s;
    }
    .btn-history:hover { background: var(--cta-h); }
  </style>
</head>
<body>

<!-- ═══════════════ MAIN ═══════════════ -->
<div class="main">
  <div class="content">
    <div class="confirm-wrap">

      <!-- 체크 아이콘 -->
      <div class="check-circle">
        <svg viewBox="0 0 28 28" fill="none">
          <path d="M6 14l6 6 10-12" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="confirm-title">주문이 완료되었습니다</div>
      <div class="confirm-sub">주문 내용을 확인해 주세요.<br>평일 오후 2시 이전 주문은 당일 출고됩니다.</div>

      <!-- 주문 상품 카드 -->
      <div class="order-card">
        <div class="order-card-head">
          <span class="order-card-head-lbl">주문 상품</span>
          <div class="order-meta">
            <span class="order-date" id="orderDate">—</span>
            <span class="order-id" id="orderId">—</span>
          </div>
        </div>
        <div class="order-items" id="orderItemsWrap">
          <!-- JS로 채워짐 -->
        </div>
      </div>

      <!-- 배송 정보 카드 -->
      <div class="order-card" style="margin-bottom:12px">
        <div class="order-card-head">
          <span class="order-card-head-lbl">배송지</span>
          <span class="order-date" id="arrivalBadge" style="font-weight:600;color:var(--text)">—</span>
        </div>
        <div style="padding:14px 18px">
          <div style="font-size:14px;font-weight:600;color:var(--text)" id="branchName">—</div>
          <div style="font-size:12px;color:var(--muted);margin-top:3px" id="branchSub">—</div>
        </div>
      </div>

      <!-- 합계 -->
      <div class="order-total-wrap">
        <div class="total-row">
          <span class="total-lbl">상품 합계</span>
          <span class="total-val" id="totalSub">—</span>
        </div>
        <div class="total-row">
          <span class="total-lbl">배송비</span>
          <span class="total-val">무료 (냉장배송)</span>
        </div>
        <div class="total-divider"></div>
        <div class="total-row">
          <span class="total-lbl-big">총 결제금액</span>
          <span class="total-val-big" id="totalFinal">—</span>
        </div>
      </div>

      <!-- 배송 안내 -->
      <div class="delivery-card">
        <div class="delivery-title">배송 안내</div>
        <div class="delivery-desc">
          평일 오후 2시 이전 주문 → 당일 출고<br>
          배송 기간 1–2 영업일 (냉장 2–8°C 유지)<br>
          배송 시작 시 문자로 운송장 번호가 발송됩니다.
        </div>
      </div>

      <!-- 버튼 -->
      <div class="btn-group">
        <a class="btn-back" href="index.html">쇼핑 계속하기</a>
        <button class="btn-history" onclick="goHistory()">주문 내역 확인</button>
      </div>

    </div>
  </div>
</div>

<script>
  function fmt(n) { return n.toLocaleString('ko-KR') + '원'; }

  const raw = localStorage.getItem('vrinkOrder');
  if (raw) {
    const order = JSON.parse(raw);

    document.getElementById('orderId').textContent = order.orderId;
    document.getElementById('orderDate').textContent = order.date;
    document.getElementById('totalSub').textContent  = fmt(order.total);
    document.getElementById('totalFinal').textContent = fmt(order.total);

    if (order.arrival) {
      document.getElementById('arrivalBadge').textContent = '도착 예정 ' + order.arrival;
    }
    if (order.branch) {
      document.getElementById('branchName').textContent = order.branch;
      document.getElementById('branchSub').textContent  = (order.branchSub || '') + ' · 냉장 배송 (2–8°C)';
    }

    const wrap = document.getElementById('orderItemsWrap');
    wrap.innerHTML = order.items.map(item => `
      <div class="order-item-row">
        <div class="oi-info">
          <div class="oi-name">${item.name}${item.variant ? ' · ' + item.variant : ''}</div>
          <div class="oi-spec">${item.spec}</div>
        </div>
        <div class="oi-qty">${item.qty}개</div>
        <div class="oi-price">${fmt(item.price)}</div>
      </div>
    `).join('');
  }

  function goHistory() {
    window.location.href = 'index.html#history';
  }
</script>
<script>
(async function() {
  var files = [
    { weight: '400', url: 'pretendard/Pretendard-Regular.woff2' },
    { weight: '500', url: 'pretendard/Pretendard-Medium.woff2' },
    { weight: '700', url: 'pretendard/Pretendard-Bold.woff2' },
  ];
  var promises = files.map(function(f) {
    var ff = new FontFace('Pretendard', "url('" + f.url + "') format('woff2')", { weight: f.weight });
    document.fonts.add(ff);
    return ff.load();
  });
  await Promise.all(promises);
  await new Promise(function(r) { requestAnimationFrame(function() { requestAnimationFrame(r); }); });
  var script = document.createElement('script');
  script.src = 'https://mcp.figma.com/mcp/html-to-design/capture.js';
  script.onload = function() {
    setTimeout(function() {
      window.figma.captureForDesign({
        captureId: '5fc10bed-980c-4955-bc71-21aebcb9a60f',
        endpoint: 'https://mcp.figma.com/mcp/capture/5fc10bed-980c-4955-bc71-21aebcb9a60f/submit',
        selector: 'body'
      });
    }, 500);
  };
  document.head.appendChild(script);
})();
</script>
</body>
</html>
