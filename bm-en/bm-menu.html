<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="logo_spinner.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VRINK Branch Admin - Menu Management</title>
<style>
@font-face { font-family: 'Pretendard'; src: url('pretendard/Pretendard-Regular.woff2') format('woff2'); font-weight: 400; }
@font-face { font-family: 'Pretendard'; src: url('pretendard/Pretendard-Medium.woff2') format('woff2'); font-weight: 500; }
@font-face { font-family: 'Pretendard'; src: url('pretendard/Pretendard-Bold.woff2') format('woff2'); font-weight: 700; }
</style>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; line-height: 1.2; }
body { font-family: 'Pretendard', sans-serif; background: #F8F8FA; color: #111111; display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 256px; min-width: 256px; height: 100vh; background: #fff; border-right: 1px solid rgba(0,0,0,.1); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
.sidebar-logo { padding: 20px 20px 16px; border-bottom: 1px solid #EDF2F6; }
.sidebar-nav { flex: 1; padding: 12px 12px; display: flex; flex-direction: column; gap: 2px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; text-decoration: none; color: #505050; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s; }
.nav-item:hover { background: #F6F6F6; }
.nav-item.active { background: #EFF6FF; color: #0095FF; font-weight: 500; }
.nav-item.nav-logout { color: #EC3D3D; }
.nav-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.nav-label { flex: 1; }
.nav-group { display: flex; flex-direction: column; }
.nav-group-trigger { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; color: #505050; font-size: 14px; font-weight: 500; cursor: pointer; }
.nav-group-trigger:hover { background: #F6F6F6; }
.nav-group-trigger.open { color: #111111; font-weight: 500; }
.nav-arrow { margin-left: auto; font-size: 10px; color: #767676; transition: transform .2s; display: inline-block; }
.nav-group-trigger.open .nav-arrow { transform: rotate(180deg); }
.nav-sub { display: none; flex-direction: column; padding-left: 32px; gap: 1px; }
.nav-sub.show { display: flex; }
.nav-sub-item { padding: 7px 12px; border-radius: 6px; font-size: 13px; color: #505050; text-decoration: none; font-weight: 400; }
.nav-sub-item:hover { background: #F6F6F6; color: #111111; }
.nav-sub-item.active { color: #0095FF; font-weight: 500; background: #EFF6FF; }
.sidebar-bottom { padding: 12px 12px 16px; border-top: 1px solid #EDF2F6; display: flex; flex-direction: column; gap: 2px; }
.sidebar-section-title { font-size: 11px; font-weight: 500; color: #A098AE; letter-spacing: .91px; padding: 4px 12px 8px; text-transform: uppercase; }
.main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { height: 64px; background: #fff; border-bottom: 1px solid #EDF2F6; display: flex; align-items: center; justify-content: flex-end; padding: 0 24px; gap: 12px; flex-shrink: 0; }
.topbar-btn { background: none; border: 1px solid #EDF2F6; border-radius: 8px; padding: 8px; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; }
.notif-badge { position: absolute; top: -4px; right: -4px; background: #0095FF; color: #fff; font-size: 10px; font-weight: 500; border-radius: 9999px; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; }
.topbar-branch { background: none; border: 1px solid #EDF2F6; border-radius: 8px; padding: 7px 12px; font-size: 13px; font-weight: 500; cursor: pointer; color: #505050; }
.topbar-user { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 8px; border-radius: 8px; }
.topbar-user:hover { background: #F6F6F6; }
.user-avatar { width: 32px; height: 32px; background: #EDF2F6; border-radius: 9999px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: #505050; }
.user-info { display: flex; flex-direction: column; }
.user-name { font-size: 13px; font-weight: 500; color: #111111; }
.user-role { font-size: 11px; color: #767676; }
.page-content { flex: 1; overflow-y: auto; padding: 28px 28px; }
.page-title { font-size: 24px; font-weight: 500; color: #111111; margin-bottom: 20px; }
.card { background: #fff; border-radius: 20px; box-shadow: 0px 4px 20px rgba(238,238,238,.5); padding: 20px 24px; }
.badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.badge-success { background: #E6FBF4; color: #00B377; }
.badge-warning { background: #FEF6E6; color: #E0A830; }
.badge-error { background: #FDE8E8; color: #D32F2F; }
.badge-primary { background: #E6F4FF; color: #0077CC; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
.btn-primary { background: #0095FF; color: #fff; }
.btn-outline { background: #fff; color: #505050; border: 1px solid #EDF2F6; }
.btn-danger { background: #EC3D3D; color: #fff; }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 4px; }
.table-wrap { background: #fff; border-radius: 20px; box-shadow: 0px 4px 20px rgba(238,238,238,.5); overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th { padding: 12px 16px; text-align: left; font-size: 12px; font-weight: 500; color: #767676; background: #F8F8FA; border-bottom: 1px solid #EDF2F6; white-space: nowrap; }
td { padding: 14px 16px; font-size: 13px; color: #111111; border-bottom: 1px solid #F6F6F6; vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #FAFAFA; }
.filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
.filter-select-btn { padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #EDF2F6; background: #fff; color: #505050; }
.tab-bar { display:flex; gap:4px; margin-bottom:16px; }
.tab-btn { padding:7px 18px; border-radius:6px; font-size:13px; font-weight:500; cursor:pointer; border:1px solid #EDF2F6; background:#fff; color:#505050; transition:all .15s; }
.tab-btn.active { background:#0095FF; color:#fff; border-color:#0095FF; }
.dropdown-menu { position:absolute; top:calc(100% + 4px); left:0; background:#fff; border:1px solid #EDF2F6; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.08); min-width:140px; padding:4px; z-index:100; display:none; }
.dropdown-menu.show { display:block; }
.dropdown-item { padding:8px 12px; border-radius:6px; font-size:13px; color:#505050; cursor:pointer; transition:background .1s; }
.dropdown-item:hover { background:#F6F6F6; }
.dropdown-item.active { color:#0095FF; font-weight:500; }
input[type="checkbox"] { width: 15px; height: 15px; accent-color: #0095FF; cursor: pointer; }
.empty-state { text-align: center; padding: 60px 20px; color: #767676; }
.empty-state svg { margin-bottom: 16px; opacity: .4; }
.empty-title { font-size: 16px; font-weight: 500; color: #505050; margin-bottom: 6px; }
.empty-desc { font-size: 13px; color: #767676; }
.img-thumb { width: 44px; height: 44px; border-radius: 8px; background: #EDF2F6; object-fit: cover; }
</style>

<script>
function toggleGroup(el){el.classList.toggle('open');var s=el.nextElementSibling;if(s)s.classList.toggle('show');}

/* ── Menu data (stored in localStorage) ── */
var _defaultMenuItems = [
  {name:'Booster Shot',  type:'functional', category:'Functional Shot', price:'₩5,500',   status:'On Sale', orders:142, imgBg:'#DBEAFE', imgEmoji:'💊', imgData:null},
  {name:'Vitamin Shot',  type:'functional', category:'Functional Shot', price:'₩5,000',   status:'On Sale', orders:98,  imgBg:'#FEF9C3', imgEmoji:'🌟', imgData:null},
  {name:'Cutting Shot',  type:'functional', category:'Functional Shot', price:'₩5,500',   status:'On Sale', orders:76,  imgBg:'#FCE7F3', imgEmoji:'✂️', imgData:null},
  {name:'Relax Shot',    type:'functional', category:'Functional Shot', price:'₩5,000',   status:'On Sale', orders:54,  imgBg:'#ECFDF5', imgEmoji:'🌿', imgData:null},
  {name:'Amino Shot',    type:'functional', category:'Functional Shot', price:'₩5,500',   status:'On Sale', orders:67,  imgBg:'#EDE9FE', imgEmoji:'💪', imgData:null},
  {name:'Flavor · Lemon',     type:'flavor', category:'Flavor', price:'₩128,000', status:'On Sale', orders:203, imgBg:'#FFF7ED', imgEmoji:'🍋', imgData:null},
  {name:'Flavor · Green Grape',type:'flavor', category:'Flavor', price:'₩128,000', status:'On Sale', orders:87,  imgBg:'#E0FFF4', imgEmoji:'🍇', imgData:null},
  {name:'Flavor · Apple',     type:'flavor', category:'Flavor', price:'₩128,000', status:'On Sale', orders:64,  imgBg:'#FFF0F0', imgEmoji:'🍎', imgData:null},
  {name:'Flavor · Cherry',    type:'flavor', category:'Flavor', price:'₩128,000', status:'On Sale', orders:51,  imgBg:'#FFF0F8', imgEmoji:'🍒', imgData:null},
  {name:'Flavor · Mango',     type:'flavor', category:'Flavor', price:'₩128,000', status:'On Sale', orders:45,  imgBg:'#FFFBE0', imgEmoji:'🥭', imgData:null},
];

function loadMenuItems() {
  try { var s = localStorage.getItem('vrink_menu_items'); return s ? JSON.parse(s) : _defaultMenuItems.map(function(i){ return Object.assign({},i); }); }
  catch(e) { return _defaultMenuItems.map(function(i){ return Object.assign({},i); }); }
}
function saveMenuItems() { localStorage.setItem('vrink_menu_items', JSON.stringify(menuItems)); }

var menuItems = loadMenuItems();
var _editIdx = null;

function getThumbInner(item) {
  if (item.imgData) return '<img src="'+item.imgData+'" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">';
  return item.imgEmoji;
}

function renderMenuTable() {
  var sbc = {'On Sale':'badge-success','Sold Out':'badge-error','Hidden':'badge-warning'};
  var cbc = {'Functional Shot':'badge-primary','Flavor':'badge-warning'};
  document.getElementById('menuTbody').innerHTML = menuItems.map(function(item, idx) {
    var bg = item.imgData ? '#fff' : item.imgBg;
    return '<tr data-type="'+item.type+'">'
      +'<td><input type="checkbox"></td>'
      +'<td><div class="img-thumb icon-upload-wrap" title="Click to change image" style="background:'+bg+';display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;" onclick="triggerIconUpload(this,'+idx+')">'
      +getThumbInner(item)+'</div></td>'
      +'<td><strong>'+item.name+'</strong></td>'
      +'<td><span class="badge '+(cbc[item.category]||'badge-primary')+'">'+item.category+'</span></td>'
      +'<td>'+item.price+'</td>'
      +'<td><span class="badge '+(sbc[item.status]||'badge-warning')+'">'+item.status+'</span></td>'
      +'<td>'+item.orders+'</td>'
      +'<td><button class="btn btn-outline btn-sm" onclick="openMenuEdit('+idx+')">Edit</button></td>'
      +'</tr>';
  }).join('');
  applyMenuFilter();
}

/* ── Tabs / Filters ── */
function setMenuTab(type, btn) {
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  applyMenuFilter();
}

var _catFilter = 'All', _statusFilter = 'All';

(function initFilterDrops() {
  var catOpts = ['All','Functional Shot','Flavor'];
  var statusOpts = ['All','On Sale','Sold Out','Hidden'];
  function makeDropHTML(id, opts) {
    return '<div class="dropdown-menu" id="'+id+'">'
      +opts.map(function(o){ return '<div class="dropdown-item" onclick="selectFilter(\''+id+'\',\''+o+'\')">'+o+'</div>'; }).join('')+'</div>';
  }
  document.addEventListener('DOMContentLoaded', function(){
    var catBtn = document.getElementById('catFilterBtn');
    var statusBtn = document.getElementById('statusFilterBtn');
    if (catBtn && statusBtn) {
      function wrapBtn(btn, html) {
        var wrap = document.createElement('div'); wrap.style.cssText = 'position:relative;display:inline-block;';
        btn.parentNode.insertBefore(wrap, btn); wrap.appendChild(btn); wrap.insertAdjacentHTML('beforeend', html);
      }
      wrapBtn(catBtn, makeDropHTML('catDrop', catOpts));
      wrapBtn(statusBtn, makeDropHTML('statusDrop', statusOpts));
      catBtn.addEventListener('click', function(e){ e.stopPropagation(); document.getElementById('statusDrop').classList.remove('show'); document.getElementById('catDrop').classList.toggle('show'); });
      statusBtn.addEventListener('click', function(e){ e.stopPropagation(); document.getElementById('catDrop').classList.remove('show'); document.getElementById('statusDrop').classList.toggle('show'); });
      document.addEventListener('click', function(){ document.querySelectorAll('.dropdown-menu').forEach(function(m){ m.classList.remove('show'); }); });
    }
    renderMenuTable();
  });
})();

window.selectFilter = function(dropId, val) {
  document.getElementById(dropId).classList.remove('show');
  if (dropId === 'catDrop') { _catFilter = val; document.getElementById('catFilterBtn').textContent = (val==='All'?'All Categories':val)+' ▾'; }
  else { _statusFilter = val; document.getElementById('statusFilterBtn').textContent = (val==='All'?'Status':val)+' ▾'; }
  applyMenuFilter();
};

function applyMenuFilter() {
  var tabActive = document.querySelector('.tab-btn.active');
  var tabType = tabActive ? tabActive.textContent.trim() : 'All';
  var typeMap = {'All':'all','Functional Shot':'functional','Flavor':'flavor'};
  var activeType = typeMap[tabType] || 'all';
  document.querySelectorAll('#menuTbody tr[data-type]').forEach(function(tr){
    var catTd = tr.querySelector('td:nth-child(4) .badge');
    var statusTd = tr.querySelector('td:nth-child(6) .badge');
    var catMatch = (_catFilter==='All') || (catTd && catTd.textContent.indexOf(_catFilter)!==-1);
    var statusMatch = (_statusFilter==='All') || (statusTd && statusTd.textContent===_statusFilter);
    var tabMatch = (activeType==='all') || (tr.dataset.type===activeType);
    tr.style.display = (catMatch && statusMatch && tabMatch) ? '' : 'none';
  });
}

/* ── Image upload (direct table click) ── */
var _currentIconIdx = null;
var _iconFileInput = (function() {
  var inp = document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.style.display='none';
  inp.onchange = function() {
    if (!inp.files[0] || _currentIconIdx===null) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      menuItems[_currentIconIdx].imgData = e.target.result;
      saveMenuItems();
      renderMenuTable();
    };
    reader.readAsDataURL(inp.files[0]); inp.value='';
  };
  document.body.appendChild(inp); return inp;
})();

function triggerIconUpload(el, idx) { _currentIconIdx = idx; _iconFileInput.click(); }

/* ── Edit modal ── */
var _editImgPending = null;

function openMenuEdit(idx) {
  _editIdx = idx; _editImgPending = null;
  var item = menuItems[idx];
  var preview = document.getElementById('editIconPreview');
  if (item.imgData) { preview.innerHTML='<img src="'+item.imgData+'" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">'; preview.style.background='#fff'; }
  else { preview.innerHTML=item.imgEmoji; preview.style.background=item.imgBg; }
  document.getElementById('editMenuName').value = item.name;
  document.getElementById('editMenuCat').value = item.category;
  document.getElementById('editMenuPrice').value = item.price.replace(/[^0-9]/g,'');
  document.getElementById('editMenuStatus').value = item.status;
  openModal('menuEditModal');
}

function previewEditIcon(inp) {
  if (!inp.files[0]) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    _editImgPending = e.target.result;
    var preview = document.getElementById('editIconPreview');
    preview.innerHTML='<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover;border-radius:8px;">'; preview.style.background='#fff';
  };
  reader.readAsDataURL(inp.files[0]);
}

function saveMenuEdit() {
  if (_editIdx===null) return;
  var item = menuItems[_editIdx];
  item.name = document.getElementById('editMenuName').value.trim() || item.name;
  item.category = document.getElementById('editMenuCat').value;
  item.type = item.category==='Functional Shot' ? 'functional' : 'flavor';
  var pv = parseInt(document.getElementById('editMenuPrice').value) || 0;
  item.price = '₩'+pv.toLocaleString('en-US');
  item.status = document.getElementById('editMenuStatus').value;
  if (_editImgPending) item.imgData = _editImgPending;
  saveMenuItems(); renderMenuTable();
  alert('Saved.'); closeModal('menuEditModal');
}

function deleteMenuItem() {
  if (_editIdx===null) return;
  if (!confirm('Delete the menu item "'+menuItems[_editIdx].name+'"?')) return;
  menuItems.splice(_editIdx, 1); _editIdx=null;
  saveMenuItems(); renderMenuTable();
  closeModal('menuEditModal');
}

/* ── Add modal ── */
function saveMenuAdd() {
  var name = document.getElementById('addMenuName').value.trim();
  if (!name) { alert('Please enter a menu name.'); return; }
  var cat = document.getElementById('addMenuCat').value;
  var pv = parseInt(document.getElementById('addMenuPrice').value)||0;
  var status = document.getElementById('addMenuStatus').value;
  var newItem = {name:name, type:cat==='Functional Shot'?'functional':'flavor', category:cat, price:'₩'+pv.toLocaleString('en-US'), status:status, orders:0, imgBg:'#EDF2F6', imgEmoji:'🍹', imgData:null};
  var fileInp = document.getElementById('addMenuFile');
  if (fileInp.files[0]) {
    var reader = new FileReader();
    reader.onload = function(e) { newItem.imgData = e.target.result; menuItems.push(newItem); saveMenuItems(); renderMenuTable(); };
    reader.readAsDataURL(fileInp.files[0]);
  } else { menuItems.push(newItem); saveMenuItems(); renderMenuTable(); }
  alert('Menu added.'); closeModal('menuAddModal');
}
</script>
<div class="modal-overlay" id="menuAddModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Add Menu</span>
      <button class="modal-close" onclick="closeModal('menuAddModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Menu Name *</label>
          <input class="form-input" id="addMenuName" placeholder="e.g. Premium Protein Shake" />
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-select" id="addMenuCat"><option>Functional Shot</option><option>Flavor</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Base Price *</label>
          <input class="form-input" type="number" id="addMenuPrice" placeholder="4500" />
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="addMenuStatus"><option>On Sale</option><option>Sold Out</option><option>Hidden</option></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Cover Image</label>
        <input class="form-input" type="file" accept="image/*" id="addMenuFile" />
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('menuAddModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveMenuAdd()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="menuEditModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Edit Menu</span>
      <button class="modal-close" onclick="closeModal('menuEditModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Menu Name</label>
          <input class="form-input" id="editMenuName" />
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-select" id="editMenuCat"><option>Functional Shot</option><option>Flavor</option></select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Base Price</label>
          <input class="form-input" type="number" id="editMenuPrice" />
        </div>
        <div class="form-group">
          <label class="form-label">Status</label>
          <select class="form-select" id="editMenuStatus"><option>On Sale</option><option>Sold Out</option><option>Hidden</option></select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-textarea">A Booster Shot to replenish energy before your workout</textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Menu Icon Image</label>
        <div style="display:flex;align-items:center;gap:12px;">
          <div id="editIconPreview" style="width:52px;height:52px;border-radius:8px;background:#DBEAFE;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden;flex-shrink:0;">💊</div>
          <button type="button" class="btn btn-outline" onclick="document.getElementById('editIconInput').click()">Change Image</button>
          <input id="editIconInput" type="file" accept="image/*" style="display:none;" onchange="previewEditIcon(this)">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" onclick="deleteMenuItem()">Delete</button>
      <button class="btn btn-outline" onclick="closeModal('menuEditModal')">Cancel</button>
      <button class="btn btn-primary" onclick="saveMenuEdit()">Save</button>
    </div>
  </div>
</div>

<script src="admin-common.js"></script>
<script src="admin-tour.js"></script>
</body>
</html>
