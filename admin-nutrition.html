* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background: #F8F8FA; color: #111111; display: flex; height: 100vh; overflow: hidden; }

<style>
.nutr-col-name { cursor:pointer; user-select:none; }

<script>
function toggleGroup(el){el.classList.toggle('open');var s=el.nextElementSibling;if(s)s.classList.toggle('show');}

var _defaultCols = [
  {name:'칼로리', unit:'kcal'},
  {name:'탄수화물', unit:'g'},
  {name:'단백질', unit:'g'},
  {name:'지방', unit:'g'},
  {name:'나트륨', unit:'mg'},
  {name:'당류', unit:'g'}
];
var _defaultData = [
  {menu:'부스터샷', vals:[45,8,2,0,12,6]},
  {menu:'비타민샷', vals:[30,7,1,0,8,5]},
  {menu:'컷팅샷',   vals:[25,5,1,0,10,3]},
  {menu:'릴렉스샷', vals:[35,9,0,0,6,7]},
  {menu:'아미노샷', vals:[55,6,8,0,15,2]},
  {menu:'레몬수',   vals:[20,5,0,0,4,4]}
];

function loadFromStorage() {
  try {
    var c = localStorage.getItem('vrink_nutr_cols');
    var d = localStorage.getItem('vrink_nutr_data');
    return { cols: c ? JSON.parse(c) : _defaultCols, data: d ? JSON.parse(d) : _defaultData };
  } catch(e) { return { cols: _defaultCols, data: _defaultData }; }
}
function saveToStorage() {
  localStorage.setItem('vrink_nutr_cols', JSON.stringify(nutritionCols));
  localStorage.setItem('vrink_nutr_data', JSON.stringify(nutritionData));
}

var _loaded = loadFromStorage();
var nutritionCols = _loaded.cols;
var nutritionData = _loaded.data;

function renderTable() {
  var th = '<th>메뉴명</th>' + nutritionCols.map(function(c,i){
    return '<th><span class="nutr-col-name" onclick="editColName('+i+',this)" title="클릭하여 컬럼명 수정">'+c.name+'</span></th>';
  }).join('') + '<th>관리</th>';
  var rows = nutritionData.map(function(row,ri){
    var tds = '<td><strong>'+row.menu+'</strong></td>';
    tds += nutritionCols.map(function(c,ci){
      return '<td>'+(row.vals[ci] !== undefined ? row.vals[ci] : 0)+' '+c.unit+'</td>';
    }).join('');
    tds += '<td style="display:flex;gap:6px;"><button class="btn btn-outline btn-sm" onclick="openNutrEdit('+ri+')">수정</button><button class="btn btn-danger btn-sm" onclick="deleteNutrRow('+ri+')">삭제</button></td>';
    return '<tr>'+tds+'</tr>';
  }).join('');
  document.getElementById('nutritionTableWrap').innerHTML =
    '<table><thead><tr>'+th+'</tr></thead><tbody>'+rows+'</tbody></table>';
}

function editColName(idx, el) {
  var cur = nutritionCols[idx].name;
  var val = prompt('컬럼명을 입력하세요:', cur);
  if (val && val.trim()) {
    nutritionCols[idx].name = val.trim();
    renderTable();
  }
}

function openNutrEdit(ri) {
  var row = nutritionData[ri];
  var html = nutritionCols.map(function(c,ci){
    var v = row.vals[ci] !== undefined ? row.vals[ci] : 0;
    return '<div class="nutr-field-row">'
      +'<input class="fn-name" value="'+c.name+'" data-col="'+ci+'" onchange="nutritionCols['+ci+'].name=this.value;renderTable();" />'
      +'<input class="fn-val" type="number" value="'+v+'" data-col="'+ci+'" />'
      +'<select class="fn-unit" data-col="'+ci+'">'
      +'<option value="g"'+(c.unit==='g'?' selected':'')+'>g</option>'
      +'<option value="mg"'+(c.unit==='mg'?' selected':'')+'>mg</option>'
      +'<option value="kcal"'+(c.unit==='kcal'?' selected':'')+'>kcal</option>'
      +'</select>'
      +'</div>';
  }).join('');
  document.getElementById('nutrEditMenuName').value = row.menu;
  document.getElementById('nutrEditFields').innerHTML = html;
  document.getElementById('nutrEditSaveBtn').onclick = function() {
    var fields = document.querySelectorAll('#nutrEditFields .nutr-field-row');
    fields.forEach(function(f,ci){
      if(ci < nutritionCols.length){
        nutritionCols[ci].name = f.querySelector('.fn-name').value || nutritionCols[ci].name;
        nutritionCols[ci].unit = f.querySelector('.fn-unit').value;
        row.vals[ci] = parseFloat(f.querySelector('.fn-val').value) || 0;
      }
    });
    renderTable();
    saveToStorage();
    alert('수정되었습니다.');
    closeModal('nutritionEditModal');
  };
  openModal('nutritionEditModal');
}

function openColManage() {
  renderColManageList();
  openModal('colManageModal');
}

function renderColManageList() {
  var html = nutritionCols.map(function(c, i){
    return '<div class="col-manage-row" data-ci="'+i+'">'
      +'<input class="cm-name" value="'+c.name+'" />'
      +'<select class="cm-unit">'
      +'<option value="g"'+(c.unit==='g'?' selected':'')+'>g</option>'
      +'<option value="mg"'+(c.unit==='mg'?' selected':'')+'>mg</option>'
      +'<option value="kcal"'+(c.unit==='kcal'?' selected':'')+'>kcal</option>'
      +'</select>'
      +'<button class="cm-del" onclick="removeNutrCol('+i+')">✕</button>'
      +'</div>';
  }).join('');
  document.getElementById('colManageList').innerHTML = html;
}

function addNutrCol() {
  nutritionCols.push({name:'새 영양소', unit:'g'});
  nutritionData.forEach(function(r){ r.vals.push(0); });
  renderColManageList();
}

function removeNutrCol(idx) {
  if (nutritionCols.length <= 1) { alert('최소 1개 컬럼이 필요합니다.'); return; }
  nutritionCols.splice(idx, 1);
  nutritionData.forEach(function(r){ r.vals.splice(idx, 1); });
  renderColManageList();
}

function saveColManage() {
  var rows = document.querySelectorAll('#colManageList .col-manage-row');
  rows.forEach(function(row, i){
    if (i < nutritionCols.length) {
      nutritionCols[i].name = row.querySelector('.cm-name').value || nutritionCols[i].name;
      nutritionCols[i].unit = row.querySelector('.cm-unit').value;
    }
  });
  renderTable();
  saveToStorage();
  closeModal('colManageModal');
}

function deleteNutrRow(ri) {
  if (!confirm(nutritionData[ri].menu + ' 영양성분을 삭제하시겠습니까?')) return;
  nutritionData.splice(ri, 1);
  renderTable();
  saveToStorage();
}

function openNutrAdd() {
  var html = '<div class="form-group"><label class="form-label">메뉴명 *</label>'
    + '<input class="form-input" id="nutrAddMenuName" placeholder="메뉴명 입력" /></div>'
    + '<div class="modal-divider"></div>'
    + '<div class="modal-section-title" style="margin-bottom:8px;">영양 정보</div>'
    + '<div class="nutr-row-editor" id="nutrAddFields">'
    + nutritionCols.map(function(c, ci) {
        return '<div class="nutr-field-row">'
          + '<span class="fn-name" style="width:90px;font-size:12px;color:#505050;padding:5px 0;">' + c.name + '</span>'
          + '<input class="fn-val" type="number" value="0" data-col="' + ci + '" style="width:80px;padding:5px 8px;border:1px solid #E2E8F0;border-radius:6px;font-size:12px;outline:none;" />'
          + '<span style="font-size:12px;color:#767676;">' + c.unit + '</span>'
          + '</div>';
      }).join('')
    + '</div>';
  document.getElementById('nutritionAddModal').querySelector('.modal-body').innerHTML = html;
  document.getElementById('nutritionAddModal').querySelector('.modal-footer .btn-primary').onclick = function() {
    var menuName = document.getElementById('nutrAddMenuName').value.trim();
    if (!menuName) { alert('메뉴명을 입력하세요.'); return; }
    var vals = [];
    document.querySelectorAll('#nutrAddFields .fn-val').forEach(function(inp) {
      vals.push(parseFloat(inp.value) || 0);
    });
    nutritionData.push({ menu: menuName, vals: vals });
    renderTable();
    saveToStorage();
    alert('등록되었습니다.');
    closeModal('nutritionAddModal');
  };
  openModal('nutritionAddModal');
}

document.addEventListener('DOMContentLoaded', function(){ renderTable(); });
</script>

    </div>
  </div>
</div>

<div class="modal-overlay" id="nutritionEditModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">영양성분 수정</span>
      <button class="modal-close" onclick="closeModal('nutritionEditModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">메뉴명</label>
        <input class="form-input" id="nutrEditMenuName" readonly style="background:#F8F8FA;color:#767676;" />
      </div>
      <div class="modal-divider"></div>
      <div class="modal-section-title" style="margin-bottom:8px;">영양 정보 수정 <span style="font-size:11px;color:#A0A8B3;font-weight:400;">(이름·값·단위 모두 편집 가능)</span></div>
      <div class="nutr-row-editor" id="nutrEditFields"></div>
    </div>

      <button class="btn btn-outline" onclick="closeModal('nutritionEditModal')">취소</button>
      <button class="btn btn-primary" id="nutrEditSaveBtn">저장</button>

</div>

<div class="modal-overlay" id="colManageModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">컬럼 관리</span>
      <button class="modal-close" onclick="closeModal('colManageModal')">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-section-title" style="margin-bottom:10px;">영양소 컬럼 이름 및 단위 편집</div>
      <div id="colManageList"></div>
      <button class="btn btn-outline btn-sm" style="margin-top:8px;" onclick="addNutrCol()">+ 영양소 추가</button>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('colManageModal')">취소</button>
      <button class="btn btn-primary" onclick="saveColManage()">저장</button>

  </div>
</div>
