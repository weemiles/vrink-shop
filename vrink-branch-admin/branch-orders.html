<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background: #F8F8FA; color: #111111; display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 256px; min-width: 256px; height: 100vh; background: #fff; border-right: 1px solid rgba(0,0,0,.1); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
.sidebar-logo { padding: 20px 20px 16px; border-bottom: 1px solid #EDF2F6; display:flex; align-items:center; gap:8px; cursor:pointer; }
.sidebar-nav { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 2px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; text-decoration: none; color: #505050; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s; }
.nav-item:hover { background: #F6F6F6; }
.nav-item.active { background: #EFF6FF; color: #0095FF; font-weight: 500; }
.nav-item.nav-logout { color: #EC3D3D; }
.nav-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.nav-label { flex: 1; }
.nav-group { display: flex; flex-direction: column; }
.nav-group-trigger { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; color: #505050; font-size: 14px; font-weight: 500; cursor: pointer; }
.nav-group-trigger:hover,.nav-group-trigger.open { background: #F6F6F6; }
.nav-arrow { margin-left: auto; font-size: 10px; color: #767676; }
.nav-sub { display: none; flex-direction: column; padding-left: 32px; gap: 1px; }
.nav-sub.show { display: flex; }
.nav-sub-item { padding: 7px 12px; border-radius: 6px; font-size: 13px; color: #505050; text-decoration: none; font-weight: 400; }
.nav-sub-item:hover { background: #F6F6F6; color: #111111; }
.nav-sub-item.active { color: #0095FF; font-weight: 500; background: #EFF6FF; }
.sidebar-bottom { padding: 12px 12px 16px; border-top: 1px solid #EDF2F6; display: flex; flex-direction: column; gap: 2px; }
.sidebar-section-title { font-size: 11px; font-weight: 500; color: #A098AE; letter-spacing: .91px; padding: 4px 12px 8px; text-transform: uppercase; }
.main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { height: 64px; background: #fff; border-bottom: 1px solid #EDF2F6; display: flex; align-items: center; justify-content: flex-end; padding: 0 24px; gap: 12px; flex-shrink: 0; }
.topbar-btn { background: none; border: 1px solid #EDF2F6; border-radius: 8px; padding: 8px; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; }
.notif-badge { position: absolute; top: -4px; right: -4px; background: #0095FF; color: #fff; font-size: 10px; font-weight: 500; border-radius: 9999px; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; }
.topbar-user { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 8px; border-radius: 8px; }
.topbar-user:hover { background: #F6F6F6; }
.user-avatar { width: 32px; height: 32px; background: #EDF2F6; border-radius: 9999px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: #505050; }
.user-name { font-size: 13px; font-weight: 500; color: #111; }
.user-role { font-size: 11px; color: #767676; }
.page-content { flex: 1; overflow-y: auto; padding: 28px; }
.page-title { font-size: 24px; font-weight: 500; color: #111; margin-bottom: 0; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.card { background: #fff; border-radius: 20px; box-shadow: 0 4px 20px rgba(238,238,238,.5); padding: 20px 24px; }
.badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.badge-success { background: #E6FBF4; color: #00B377; }
.badge-warning { background: #FEF6E6; color: #E0A830; }
.badge-error { background: #FDE8E8; color: #D32F2F; }
.badge-primary { background: #E6F4FF; color: #0077CC; }
.badge-gray { background: #F0F0F0; color: #505050; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
.btn-primary { background: #0095FF; color: #fff; }
.btn-outline { background: #fff; color: #505050; border: 1px solid #EDF2F6; }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { padding: 10px 12px; background: #FAFAFA; border-bottom: 1px solid #EDF2F6; font-weight: 500; color: #767676; text-align: left; font-size: 12px; }
tbody td { padding: 12px; border-bottom: 1px solid #EDF2F6; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #FAFAFA; }
.table-wrap { background: #fff; border-radius: 20px; box-shadow: 0 4px 20px rgba(238,238,238,.5); overflow: hidden; }

/* Filter bar */
.filter-bar { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; justify-content: space-between; }
.filter-select-btn { padding: 7px 14px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #EDF2F6; background: #fff; color: #505050; display: flex; align-items: center; gap: 6px; position: relative; }
.filter-select-btn.active { border-color: #0095FF; color: #0095FF; }
.search-input { padding: 7px 12px; border-radius: 6px; border: 1px solid #EDF2F6; font-size: 13px; color: #111; background: #fff; outline: none; width: 200px; }
.dropdown-menu { position: absolute; top: calc(100% + 4px); left: 0; background: #fff; border: 1px solid #EDF2F6; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.08); min-width: 140px; padding: 4px; z-index: 100; display: none; }
.dropdown-menu.show { display: block; }
.dropdown-item { padding: 8px 12px; border-radius: 6px; font-size: 13px; color: #505050; cursor: pointer; }
.dropdown-item:hover { background: #F6F6F6; }
.dropdown-item.active { color: #0095FF; font-weight: 500; }
.member-id { font-size: 11px; color: #767676; max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.cancel-btn { background: none; border: 1px solid #EDF2F6; border-radius: 4px; padding: 4px 10px; font-size: 11px; font-weight: 500; color: #505050; cursor: pointer; }
.cancel-btn:hover { border-color: #EC3D3D; color: #EC3D3D; }
.text-muted { color: #C0C0C0; }

/* Pagination */
.pagination { display: flex; align-items: center; justify-content: center; gap: 4px; padding: 16px; }
.page-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px; border: 1px solid #EDF2F6; background: #fff; font-size: 13px; color: #505050; cursor: pointer; }
.page-btn.active { background: #0095FF; color: #fff; border-color: #0095FF; font-weight: 500; }
.page-btn:hover:not(.active) { background: #F6F6F6; }

.card-title { font-size: 16px; font-weight: 500; color: #111111; margin-bottom: 4px; }
.card-sub { font-size: 12px; color: #767676; }
.btn-danger { background: #EC3D3D; color: #fff; }
.badge-gray { background: #F0F0F0; color: #505050; }
.user-info { display: flex; flex-direction: column; }
.stat-value { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 500; color: #111111; margin-bottom: 6px; }
.nav-group-trigger.open .nav-arrow { transform: rotate(180deg); }
.nav-arrow { transition: transform .2s; display: inline-block; }
.topbar-branch-btn { display:flex; align-items:center; gap:6px; height:36px; padding:0 12px; border:1px solid #EDF2F6; border-radius:8px; font-size:13px; font-weight:500; color:#111; cursor:pointer; background:#fff; white-space:nowrap; }
.topbar-branch-btn:hover { background:#F6F6F6; }
.topbar-user-wrap { display:flex; align-items:center; gap:8px; cursor:pointer; padding:4px 8px; border-radius:8px; }
.topbar-user-wrap:hover { background:#F6F6F6; }
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:999; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:#fff; border-radius:16px; width:480px; max-width:95vw; max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.15); }
.modal-header { display:flex; align-items:center; justify-content:space-between; padding:20px 24px 16px; border-bottom:1px solid #EDF2F6; }
.modal-title { font-size:16px; font-weight:500; color:#111; }
.modal-close { background:none; border:none; font-size:16px; color:#767676; cursor:pointer; padding:4px; }
.modal-body { padding:20px 24px; }
.modal-footer { padding:16px 24px; border-top:1px solid #EDF2F6; display:flex; justify-content:flex-end; gap:8px; }
</style>

const PAGE_SIZE = 5;
let currentPage = 1;
let filteredOrders = ALL_ORDERS.slice();

// 필터 상태
const ordFilters = { date: '', pay: '', status: '' };

function statusBadge(s) {
  if (s === '결제완료') return '<span class="badge badge-success">' + s + '</span>';
  if (s === '결제대기') return '<span class="badge badge-warning">' + s + '</span>';
  if (s === '취소')     return '<span class="badge badge-error">' + s + '</span>';
  return '<span class="badge badge-gray">' + s + '</span>';
}

function renderTable() {
  var tbody = document.getElementById('orderTableBody');
  var start = (currentPage - 1) * PAGE_SIZE;
  var slice = filteredOrders.slice(start, start + PAGE_SIZE);
  tbody.innerHTML = slice.map(function(o) {
    var memberCell = o.memberId ? '<span class="member-id">' + o.memberId + '</span>' : '<span class="text-muted">-</span>';
    var channelCell = (o.channel && o.channel !== '-') ? '<span style="font-size:11px;color:#505050;">' + o.channel + '</span>' : '<span class="text-muted">-</span>';
    var kioskCell = o.kioskId ? '<span style="font-size:11px;color:#767676;">' + o.kioskId + '</span>' : '<span class="text-muted">-</span>';
    var cancelBtn = o.status !== '취소' ? '<button class="cancel-btn" onclick="cancelOrder(\'' + o.no + '\',this)">취소</button>' : '<span class="text-muted">-</span>';
    return '<tr>'
      + '<td>' + memberCell + '</td>'
      + '<td style="color:#767676;white-space:nowrap;font-size:12px;">' + o.dt + '</td>'
      + '<td style="font-size:11px;color:#505050;">' + o.no + '</td>'
      + '<td>' + o.detail + ' <button class="btn btn-outline btn-sm" onclick="showDetail(\'' + o.no + '\')">상세보기</button></td>'
      + '<td style="font-size:13px;">' + (o.payMethod || '<span class="text-muted">-</span>') + '</td>'
      + '<td style="font-weight:500;">' + o.amount.toLocaleString() + '원</td>'
      + '<td>' + statusBadge(o.status) + '</td>'
      + '<td>' + channelCell + '</td>'
      + '<td>' + kioskCell + '</td>'
      + '<td>' + cancelBtn + '</td>'
      + '</tr>';
  }).join('');
  renderPagination();
}

function renderPagination() {
  var total = Math.ceil(filteredOrders.length / PAGE_SIZE);
  var pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  var html = '<button class="page-btn" onclick="if(currentPage>1){currentPage--;renderTable();}">‹</button>';
  for (var i = 1; i <= total; i++) {
    html += '<button class="page-btn' + (i === currentPage ? ' active' : '') + '" onclick="goPage(' + i + ')">' + i + '</button>';
  }
  html += '<button class="page-btn" onclick="if(currentPage<' + total + '){currentPage++;renderTable();}">›</button>';
  pg.innerHTML = html;
}

function goPage(n) { currentPage = n; renderTable(); }

function applyFilter() {
  var search = (document.getElementById('ordSearch').value || '').trim().toLowerCase();
  var today = new Date().toISOString().split('T')[0];
  filteredOrders = ALL_ORDERS.filter(function(o) {
    var d = o.dt.replace(/\//g, '-').split(' ')[0];
    if (ordFilters.date === 'today' && d !== today) return false;
    if (ordFilters.date === 'week') {
      var weekAgo = new Date(Date.now() - 7*24*60*60*1000).toISOString().split('T')[0];
      if (d < weekAgo) return false;
    }
    if (ordFilters.date === 'month') {
      var monthStart = today.slice(0,7) + '-01';
      if (d < monthStart) return false;
    }
    if (ordFilters.pay && o.payMethod !== ordFilters.pay) return false;
    if (ordFilters.status && o.status !== ordFilters.status) return false;
    if (search && !o.no.toLowerCase().includes(search) && !o.memberId.toLowerCase().includes(search)) return false;
    return true;
  });
  currentPage = 1;
  renderTable();
}

function ordSetFilter(type, val, label, btnId, dropId) {
  ordFilters[type] = val;
  var btn = document.getElementById(btnId);
  var defaultLabels = { date: '날짜', pay: '결제 수단', status: '결제 상태' };
  setFilterBtnLabel(btn, val ? label : defaultLabels[type]);
  btn.classList.toggle('active', !!val);
  document.querySelectorAll('#' + dropId + ' .dropdown-item').forEach(function(el) {
    el.classList.toggle('active', el.textContent === label || (!val && el.textContent === '전체'));
  });
  document.getElementById(dropId).classList.remove('show');
  applyFilter();
}

// 드롭다운 토글
document.addEventListener('click', function(e) {
  var btn = e.target.closest('.filter-select-btn');
  document.querySelectorAll('.dropdown-menu').forEach(function(d) { d.classList.remove('show'); });
  if (btn) {
    var drop = btn.querySelector('.dropdown-menu');
    if (drop) { drop.classList.add('show'); e.stopPropagation(); }
  }
});

function showDetail(no) {
  var o = ALL_ORDERS.find(function(x){ return x.no === no; });
  if (!o) return;
  document.getElementById('orderDetailBody').innerHTML =
    '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px;background:#F8F8FA;border-radius:10px;">'
    + '<div><div style="font-size:11px;color:#767676;margin-bottom:3px;">주문번호</div><div style="font-size:13px;font-weight:500;">' + o.no + '</div></div>'
    + '<div><div style="font-size:11px;color:#767676;margin-bottom:3px;">주문일시</div><div style="font-size:13px;">' + o.dt + '</div></div>'
    + '<div><div style="font-size:11px;color:#767676;margin-bottom:3px;">결제 수단</div><div style="font-size:13px;">' + (o.payMethod || '-') + '</div></div>'
    + '<div><div style="font-size:11px;color:#767676;margin-bottom:3px;">결제 금액</div><div style="font-size:13px;font-weight:500;color:#0095FF;">' + o.amount.toLocaleString() + '원</div></div>'
    + '<div><div style="font-size:11px;color:#767676;margin-bottom:3px;">결제 상태</div><div style="font-size:13px;">' + statusBadge(o.status) + '</div></div>'
    + '<div><div style="font-size:11px;color:#767676;margin-bottom:3px;">키오스크 ID</div><div style="font-size:13px;">' + (o.kioskId || '-') + '</div></div>'
    + '</div>'
    + '<div style="margin-top:16px;"><div style="font-size:11px;color:#767676;margin-bottom:6px;">주문 상세</div><div style="font-size:13px;">' + o.detail + '</div></div>';
  openModal('orderDetailModal');
}

function cancelOrder(no, btn) {
  if (!confirm('주문을 취소하시겠습니까?')) return;
  var o = ALL_ORDERS.find(function(x){ return x.no === no; });
  if (o) { o.status = '취소'; }
  applyFilter();
}

function toggleGroup(el) {
  el.classList.toggle('open');
  var sub = el.nextElementSibling;
  if (sub) sub.classList.toggle('show');
}

renderTable();
