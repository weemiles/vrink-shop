body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background: #F8F8FA; color: #111111; display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 256px; min-width: 256px; height: 100vh; background: #fff; border-right: 1px solid rgba(0,0,0,.1); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }

.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; text-decoration: none; color: #505050; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s; }
.nav-item:hover { background: #F6F6F6; }
.nav-item.active { background: #EFF6FF; color: #0095FF; font-weight: 500; }
.nav-item.nav-logout { color: #EC3D3D; }
.nav-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.nav-label { flex: 1; }
.nav-group { display: flex; flex-direction: column; }
.nav-group-trigger { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; color: #505050; font-size: 14px; font-weight: 500; cursor: pointer; }
.nav-group-trigger:hover { background: #F6F6F6; }
.nav-arrow { margin-left: auto; font-size: 10px; color: #767676; }
.nav-sub { display: none; flex-direction: column; padding-left: 32px; gap: 1px; }
.nav-sub.show { display: flex; }
.nav-sub-item { padding: 7px 12px; border-radius: 6px; font-size: 13px; color: #505050; text-decoration: none; font-weight: 400; }
.nav-sub-item:hover { background: #F6F6F6; color: #111111; }

.page-content { flex: 1; overflow-y: auto; padding: 28px; }

.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.card { background: #fff; border-radius: 20px; box-shadow: 0 4px 20px rgba(238,238,238,.5); padding: 20px 24px; }
.badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }

.badge-warning { background: #FEF6E6; color: #E0A830; }
.badge-error { background: #FDE8E8; color: #D32F2F; }

.badge-gray { background: #F0F0F0; color: #505050; }

.btn-primary { background: #0095FF; color: #fff; }
.btn-outline { background: #fff; color: #505050; border: 1px solid #EDF2F6; }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { padding: 10px 12px; background: #FAFAFA; border-bottom: 1px solid #EDF2F6; font-weight: 500; color: #767676; text-align: left; font-size: 12px; }
tbody td { padding: 12px; border-bottom: 1px solid #EDF2F6; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #FAFAFA; }
.table-wrap { background: #fff; border-radius: 20px; box-shadow: 0 4px 20px rgba(238,238,238,.5); overflow: hidden; }

.filter-sep { color: #CCC; font-size: 13px; }

.page-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px; border: 1px solid #EDF2F6; background: #fff; font-size: 13px; color: #505050; cursor: pointer; }

.card-title { font-size: 16px; font-weight: 500; color: #111111; margin-bottom: 4px; }

.btn-danger { background: #EC3D3D; color: #fff; }

const PAGE_SIZE = 5;
let currentPage = 1;
let filteredOrders = [...ALL_ORDERS];
let _dateFilter = '', _payMethodFilter = '', _statusFilter = '';

function statusBadge(s) {
  if (s === '결제 완료') return `<span class="badge badge-success">${s}</span>`;
  if (s === '취소') return `<span class="badge badge-error">${s}</span>`;
  return `<span style="color:#CCC">-</span>`;
}

function renderTable() {
  const tbody = document.getElementById('orderTableBody');
  const start = (currentPage - 1) * PAGE_SIZE;
  const slice = filteredOrders.slice(start, start + PAGE_SIZE);
  tbody.innerHTML = slice.map(o => `
    <tr>
      <td style="font-family:monospace;font-size:12px;color:#505050;">${o.memberId}</td>
      <td style="font-size:12px;color:#505050;">${o.dt}</td>
      <td style="font-family:monospace;font-size:12px;color:#505050;">${o.no}</td>
      <td><span style="font-size:13px;">${o.items}</span> <button class="btn btn-outline btn-sm" style="font-size:11px;padding:3px 8px;" onclick="void 0">상세보기</button></td>
      <td style="font-size:13px;">${o.payMethod === '-' ? '<span style="color:#CCC">-</span>' : o.payMethod}</td>
      <td style="font-weight:500;">${o.amount.toLocaleString()}원</td>
      <td>${statusBadge(o.status)}</td>
      <td style="font-size:12px;color:#505050;">${o.channel === '-' ? '<span style="color:#CCC">-</span>' : o.channel}</td>
      <td style="font-family:monospace;font-size:12px;color:#505050;">${o.kiosk === '-' ? '<span style="color:#CCC">-</span>' : o.kiosk}</td>
      <td>${o.status === '결제 완료' ? '<button class="btn btn-outline btn-sm" style="font-size:11px;padding:3px 8px;color:#EC3D3D;border-color:#EC3D3D;">취소</button>' : '<span style="color:#CCC">-</span>'}</td>
    </tr>
  `).join('');
  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filteredOrders.length / PAGE_SIZE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${Math.max(1,currentPage-1)})">‹</button>`;
  for (let i = 1; i <= total; i++) {
    html += `<button class="page-btn${i === currentPage ? ' active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  html += `<button class="page-btn" onclick="goPage(${Math.min(total,currentPage+1)})">›</button>`;
  pg.innerHTML = html;
}

function goPage(n) { currentPage = n; renderTable(); }

function setOrderFilter(type, val, label) {
  if (type === 'date') { _dateFilter = val; setFilterBtnLabel('dateFilterBtn', val ? label : '날짜'); document.getElementById('dateFilterDrop').style.display='none'; }
  if (type === 'payMethod') { _payMethodFilter = val; setFilterBtnLabel('payMethodFilterBtn', val ? label : '결제 수단'); document.getElementById('payMethodFilterDrop').style.display='none'; }
  if (type === 'status') { _statusFilter = val; setFilterBtnLabel('statusFilterBtn', val ? label : '결제 상태'); document.getElementById('statusFilterDrop').style.display='none'; }
  applyFilter();
}

function applyFilter() {
  const search = (document.getElementById('menuSearch').value || '').trim().toLowerCase();
  filteredOrders = ALL_ORDERS.filter(function(o) {
    if (_payMethodFilter && o.payMethod !== _payMethodFilter) return false;
    if (_statusFilter && o.status !== _statusFilter) return false;
    if (search && !o.no.toLowerCase().includes(search) && !o.memberId.toLowerCase().includes(search) && !o.items.toLowerCase().includes(search)) return false;
    return true;
  });
  currentPage = 1;
  renderTable();
}

function toggleGroup(el) { el.classList.toggle('open'); const sub = el.nextElementSibling; sub.classList.toggle('show'); }

document.addEventListener('click', function(e) {
  var btn = e.target.closest('.filter-select-btn');
  document.querySelectorAll('.inv-dropdown').forEach(function(d) { d.style.display = 'none'; });
  if (btn) { var drop = btn.querySelector('.inv-dropdown'); if (drop) drop.style.display = drop.style.display === 'none' ? 'block' : 'none'; }
});

renderTable();
function toggleTBDrop(id) {
  document.querySelectorAll('.tb-dropdown').forEach(d => { if(d.id !== id) d.classList.remove('open'); });
  document.getElementById(id).classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if(!e.target.closest('.topbar-branch-btn') && !e.target.closest('.topbar-admin-btn')) {
    document.querySelectorAll('.tb-dropdown').forEach(d => d.classList.remove('open'));
  }
});
