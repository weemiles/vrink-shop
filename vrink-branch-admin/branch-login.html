<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>브링크 지점관리 - 로그인</title>
  <link rel="icon" type="image/png" href="vrink-logo.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Noto+Sans+KR:wght@400;500&family=Poppins:wght@500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #F8F8FA;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans KR', 'Inter', sans-serif;
    }
    .login-card {
      width: 400px;
      background: #fff;
      border-radius: 24px;
      box-shadow: 0 8px 40px rgba(0,0,0,.08);
      padding: 40px;
    }
    .logo-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 32px;
    }
    .logo-row img {
      height: 40px;
    }
    .logo-row span {
      font-family: 'Poppins', sans-serif;
      font-weight: 500;
      font-size: 20px;
      color: #111;
    }
    .login-title {
      font-size: 22px;
      font-weight: 500;
      color: #111;
      text-align: center;
      margin-bottom: 8px;
    }
    .login-subtitle {
      font-size: 13px;
      color: #767676;
      text-align: center;
      margin-bottom: 28px;
    }
    .form-label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #505050;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      height: 46px;
      border: 1px solid #EDF2F6;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 14px;
      font-family: inherit;
      color: #111;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 14px;
    }
    .form-input:focus {
      border-color: #0095FF;
    }
    .login-btn {
      width: 100%;
      height: 46px;
      background: #0095FF;
      color: #fff;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 500;
      font-family: inherit;
      border: none;
      cursor: pointer;
      margin-top: 4px;
      transition: background .15s;
    }
    .login-btn:hover {
      background: #007DE0;
    }
    .error-msg {
      display: none;
      color: #D32F2F;
      font-size: 12px;
      text-align: center;
      margin-top: 12px;
    }
    .error-msg.show {
      display: block;
    }
    .hq-link {
      display: block;
      font-size: 12px;
      color: #767676;
      text-align: center;
      margin-top: 20px;
      text-decoration: none;
    }
    .hq-link:hover {
      color: #0095FF;
    }
  
.card-title { font-size: 16px; font-weight: 500; color: #111111; margin-bottom: 4px; }
.card-sub { font-size: 12px; color: #767676; }
.btn-danger { background: #EC3D3D; color: #fff; }
.badge-gray { background: #F0F0F0; color: #505050; }
.user-info { display: flex; flex-direction: column; }
.stat-value { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 500; color: #111111; margin-bottom: 6px; }
.nav-group-trigger.open .nav-arrow { transform: rotate(180deg); }
.nav-arrow { transition: transform .2s; display: inline-block; }
</style>
</head>
<body>
  <div class="login-card">
    <div class="logo-row">
      <img src="logo_spinner.png" alt="VRINK 로고">
    </div>
    <div class="login-title">지점 관리자 로그인</div>

    <label class="form-label" for="inputId">아이디</label>
    <input class="form-input" id="inputId" type="text" placeholder="아이디 입력" autocomplete="username">

    <label class="form-label" for="inputPw">비밀번호</label>
    <input class="form-input" id="inputPw" type="password" placeholder="비밀번호 입력" autocomplete="current-password">

    <button class="login-btn" id="loginBtn">로그인</button>

    <div class="error-msg" id="errorMsg">아이디 또는 비밀번호가 올바르지 않습니다.</div>

    <a class="hq-link" href="../admin-index.html">본사 관리자이신가요? 본사 페이지로 이동</a>
  </div>

  <script>
    // 이미 로그인 상태면 바로 이동
    if (sessionStorage.getItem('branchAuth')) {
      location.href = 'branch-index.html';
    }

    function doLogin() {
      var id = document.getElementById('inputId').value;
      var pw = document.getElementById('inputPw').value;
      var errorMsg = document.getElementById('errorMsg');
      if (id === 'branch01' && pw === '1234') {
        sessionStorage.setItem('branchAuth', '1');
        location.href = 'branch-index.html';
      } else {
        errorMsg.classList.add('show');
      }
    }

    document.getElementById('loginBtn').addEventListener('click', doLogin);

    document.getElementById('inputId').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });
    document.getElementById('inputPw').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') doLogin();
    });

    // 입력 시 에러 메시지 숨기기
    document.getElementById('inputId').addEventListener('input', function() {
      document.getElementById('errorMsg').classList.remove('show');
    });
    document.getElementById('inputPw').addEventListener('input', function() {
      document.getElementById('errorMsg').classList.remove('show');
    });
  </script>
</body>
</html>
