<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="vrink-logo.png">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>브링크 지점관리 - 메뉴 설정</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Noto+Sans+KR:wght@400;500&family=Poppins:wght@500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background: #F8F8FA; color: #111111; display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 256px; min-width: 256px; height: 100vh; background: #fff; border-right: 1px solid rgba(0,0,0,.1); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
.sidebar-logo { padding: 20px 20px 16px; border-bottom: 1px solid #EDF2F6; display:flex; align-items:center; gap:8px; cursor:pointer; }
.sidebar-nav { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 2px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; text-decoration: none; color: #505050; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s; }
.nav-item:hover { background: #F6F6F6; }
.nav-item.active { background: #EFF6FF; color: #0095FF; font-weight: 500; }
.nav-item.nav-logout { color: #EC3D3D; }
.nav-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.nav-label { flex: 1; }
.nav-group { display: flex; flex-direction: column; }
.nav-group-trigger { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; color: #505050; font-size: 14px; font-weight: 500; cursor: pointer; }
.nav-group-trigger:hover { background: #F6F6F6; }
.nav-group-trigger.open { color: #111111; font-weight: 500; }
.nav-arrow { margin-left: auto; font-size: 10px; color: #767676; }
.nav-sub { display: none; flex-direction: column; padding-left: 32px; gap: 1px; }
.nav-sub.show { display: flex; }
.nav-sub-item { padding: 7px 12px; border-radius: 6px; font-size: 13px; color: #505050; text-decoration: none; font-weight: 400; }
.nav-sub-item:hover { background: #F6F6F6; color: #111111; }
.nav-sub-item.active { color: #0095FF; font-weight: 500; background: #EFF6FF; }
.sidebar-bottom { padding: 12px 12px 16px; border-top: 1px solid #EDF2F6; display: flex; flex-direction: column; gap: 2px; }
.sidebar-section-title { font-size: 11px; font-weight: 500; color: #A098AE; letter-spacing: .91px; padding: 4px 12px 8px; text-transform: uppercase; }
.main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { height: 64px; background: #fff; border-bottom: 1px solid #EDF2F6; display: flex; align-items: center; justify-content: flex-end; padding: 0 24px; gap: 10px; flex-shrink: 0; }
.topbar-notif-btn { background: none; border: 1px solid #EDF2F6; border-radius: 8px; padding: 8px; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; }
.topbar-notif-btn:hover { background: #F6F6F6; }
.notif-badge { position: absolute; top: -4px; right: -4px; background: #0095FF; color: #fff; font-size: 10px; font-weight: 700; border-radius: 9999px; min-width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; padding: 0 3px; }
.topbar-branch-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border: 1px solid #E0E0E0; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 500; color: #111; background: #fff; position: relative; user-select: none; }
.topbar-branch-btn:hover { background: #F6F6F6; }
.topbar-admin-btn { display: flex; align-items: center; gap: 8px; padding: 5px 10px 5px 5px; border: 1px solid #EDF2F6; border-radius: 8px; cursor: pointer; background: #fff; position: relative; user-select: none; }
.topbar-admin-btn:hover { background: #F6F6F6; }
.user-avatar-sm { width: 28px; height: 28px; border-radius: 50%; background: #E8E8E8; color: #505050; font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.admin-info { display: flex; flex-direction: column; gap: 1px; }
.admin-name { font-size: 13px; font-weight: 600; color: #111; line-height: 1.2; }
.admin-role-text { font-size: 11px; color: #767676; line-height: 1.2; }
.tb-dropdown { display: none; position: absolute; top: calc(100% + 6px); right: 0; background: #fff; border: 1px solid #EDF2F6; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.10); min-width: 140px; z-index: 200; overflow: hidden; }
.tb-dropdown.open { display: block; }
.tb-dd-item { padding: 10px 14px; font-size: 13px; color: #333; cursor: pointer; }
.tb-dd-item:hover { background: #F6F6F6; }
.tb-dd-item.active { color: #0095FF; font-weight: 600; }
.tb-dd-logout { color: #EC3D3D; }
.page-content { flex: 1; overflow-y: auto; padding: 28px; }
.page-title { font-size: 24px; font-weight: 500; color: #111; margin-bottom: 20px; }
.badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.badge-success { background: #E6FBF4; color: #00B377; }
.badge-warning { background: #FEF6E6; color: #E0A830; }
.badge-error { background: #FDE8E8; color: #D32F2F; }
.badge-primary { background: #E6F4FF; color: #0077CC; }
.badge-gray { background: #F0F0F0; color: #505050; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
.btn-primary { background: #0095FF; color: #fff; }
.btn-outline { background: #fff; color: #505050; border: 1px solid #EDF2F6; }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { padding: 10px 12px; background: #FAFAFA; border-bottom: 1px solid #EDF2F6; font-weight: 500; color: #767676; text-align: left; font-size: 12px; }
tbody td { padding: 12px; border-bottom: 1px solid #EDF2F6; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #FAFAFA; }
.table-wrap { background: #fff; border-radius: 20px; box-shadow: 0 4px 20px rgba(238,238,238,.5); overflow: hidden; }
.toggle { width: 40px; height: 22px; background: #E0E0E0; border-radius: 11px; position: relative; cursor: pointer; transition: background .2s; border: none; flex-shrink: 0; display:inline-block; }
.toggle.on { background: #0095FF; }
.toggle::after { content:''; position: absolute; width: 16px; height: 16px; background: #fff; border-radius: 9999px; top: 3px; left: 3px; transition: left .2s; }
.toggle.on::after { left: 21px; }

.price-input { width: 90px; height: 34px; border: 1px solid #EDF2F6; border-radius: 6px; padding: 0 8px; font-size: 13px; text-align: right; font-family: inherit; color: #111; outline: none; }
.price-input:focus { border-color: #0095FF; font-weight: 500; }
select.shot-select { height: 34px; border: 1px solid #EDF2F6; border-radius: 6px; padding: 0 8px; font-size: 13px; font-family: inherit; color: #111; outline: none; background: #fff; cursor: pointer; }
select.shot-select:focus { border-color: #0095FF; font-weight: 500; }
.info-banner { background: #fff; border: 1px solid #EDF2F6; border-radius: 12px; padding: 14px 18px; margin-bottom: 20px; font-size: 13px; color: #505050; display: flex; align-items: flex-start; gap: 8px; }
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }

.card-title { font-size: 16px; font-weight: 500; color: #111111; margin-bottom: 4px; }
.card-sub { font-size: 12px; color: #767676; }
.btn-danger { background: #EC3D3D; color: #fff; }
.badge-gray { background: #F0F0F0; color: #505050; }

.stat-value { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 500; color: #111111; margin-bottom: 6px; }
.nav-group-trigger.open .nav-arrow { transform: rotate(180deg); }
.nav-arrow { transition: transform .2s; display: inline-block; }
</style>
</head>

<div class="main-wrapper">
  <header class="topbar">

      <div class="tb-dropdown" id="tb-branch-dd">
        <div class="tb-dd-item active">빌드업 성수점</div>

        <div class="tb-dd-item tb-dd-logout" onclick="if(confirm('로그아웃 하시겠습니까?')){sessionStorage.removeItem('branchAuth');location.href='branch-login.html';}">로그아웃</div>

<script>
var defaultSettings = [
  { name: '부스터샷', category: '기능샷', basePrice: '5,000원', price: 5500, shotPrice: 500, maxShot: 2, active: true },
  { name: '비타민샷', category: '기능샷', basePrice: '4,500원', price: 5000, shotPrice: 500, maxShot: 2, active: true },
  { name: '컷팅샷',  category: '기능샷', basePrice: '5,000원', price: 5500, shotPrice: 500, maxShot: 2, active: true },
  { name: '릴렉스샷', category: '기능샷', basePrice: '4,500원', price: 5000, shotPrice: 500, maxShot: 1, active: true },
  { name: '아미노샷', category: '기능샷', basePrice: '5,000원', price: 5500, shotPrice: 500, maxShot: 2, active: false },
  { name: '맛·레몬',  category: '맛샷',  basePrice: '120,000원', price: 128000, shotPrice: 700, maxShot: 3, active: true },
  { name: '맛·청포도', category: '맛샷', basePrice: '120,000원', price: 128000, shotPrice: 700, maxShot: 2, active: true },
  { name: '맛·사과',  category: '맛샷',  basePrice: '120,000원', price: 128000, shotPrice: 700, maxShot: 2, active: true },
  { name: '맛·체리',  category: '맛샷',  basePrice: '120,000원', price: 128000, shotPrice: 700, maxShot: 1, active: false },
  { name: '맛·망고',  category: '맛샷',  basePrice: '120,000원', price: 128000, shotPrice: 700, maxShot: 2, active: true }
];

function loadSettings() {
  try {
    var s = localStorage.getItem('branchMenuSettings');
    return s ? JSON.parse(s) : defaultSettings;
  } catch(e) {
    return defaultSettings;
  }
}

function renderTable() {
  var data = loadSettings();
  var tbody = document.getElementById('menuTbody');
  tbody.innerHTML = '';
  data.forEach(function(item, i) {
    var catBadge = item.category === '기능샷'
      ? '<span class="badge badge-primary">기능샷</span>'
      : '<span class="badge badge-warning">맛샷</span>';
    var toggleClass = item.active ? 'toggle on' : 'toggle';
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td style="font-weight:500;color:#111;">' + item.name + '</td>' +
      '<td>' + catBadge + '</td>' +
      '<td><input type="number" class="price-input" data-field="price" data-idx="' + i + '" value="' + item.price + '"> 원</td>' +
      '<td><input type="number" class="price-input" data-field="shotPrice" data-idx="' + i + '" value="' + item.shotPrice + '"> 원</td>' +
      '<td><button class="' + toggleClass + '" data-idx="' + i + '" onclick="toggleStatus(this)"></button></td>';
    tbody.appendChild(tr);
  });
}

function toggleStatus(btn) {
  btn.classList.toggle('on');
}

function saveMenuSettings() {
  var data = loadSettings();
  var tbody = document.getElementById('menuTbody');
  var rows = tbody.querySelectorAll('tr');
  rows.forEach(function(row, i) {
    var priceInput = row.querySelector('input[data-field="price"]');
    var shotPriceInput = row.querySelector('input[data-field="shotPrice"]');
    var maxShotSelect = row.querySelector('select[data-field="maxShot"]');
    var toggleBtn = row.querySelector('.toggle');
    if (priceInput) data[i].price = parseInt(priceInput.value) || data[i].price;
    if (shotPriceInput) data[i].shotPrice = parseInt(shotPriceInput.value) || data[i].shotPrice;
    if (maxShotSelect) data[i].maxShot = parseInt(maxShotSelect.value);
    if (toggleBtn) data[i].active = toggleBtn.classList.contains('on');
  });
  localStorage.setItem('branchMenuSettings', JSON.stringify(data));
  showBranchToast('설정이 저장되었습니다');
}

renderTable();

function toggleGroup(el){el.classList.toggle('open');var s=el.nextElementSibling;if(s)s.classList.toggle('show');}
(function(){if(!sessionStorage.getItem('branchAuth')){location.href='branch-login.html';}})();
function toggleTBDrop(id) {
  document.querySelectorAll('.tb-dropdown').forEach(d => { if(d.id !== id) d.classList.remove('open'); });
  document.getElementById(id).classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if(!e.target.closest('.topbar-branch-btn') && !e.target.closest('.topbar-admin-btn')) {
    document.querySelectorAll('.tb-dropdown').forEach(d => d.classList.remove('open'));
  }
});
</script>
<script src="branch-common.js"></script>
</body>
