<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>브링크 지점관리 - 멤버십 상품</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background: #F8F8FA; color: #111111; display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 256px; min-width: 256px; height: 100vh; background: #fff; border-right: 1px solid rgba(0,0,0,.1); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
.sidebar-logo { padding: 20px 20px 16px; border-bottom: 1px solid #EDF2F6; display:flex; align-items:center; gap:8px; cursor:pointer; }
.sidebar-nav { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 2px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; text-decoration: none; color: #505050; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s; }
.nav-item:hover { background: #F6F6F6; }
.nav-item.active { background: #EFF6FF; color: #0095FF; font-weight: 500; }
.nav-item.nav-logout { color: #EC3D3D; }
.nav-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.nav-label { flex: 1; }
.nav-group { display: flex; flex-direction: column; }
.nav-group-trigger { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; color: #505050; font-size: 14px; font-weight: 500; cursor: pointer; }
.nav-group-trigger:hover { background: #F6F6F6; }
.nav-arrow { margin-left: auto; font-size: 10px; color: #767676; }
.nav-sub { display: none; flex-direction: column; padding-left: 32px; gap: 1px; }
.nav-sub.show { display: flex; }
.nav-sub-item { padding: 7px 12px; border-radius: 6px; font-size: 13px; color: #505050; text-decoration: none; font-weight: 400; }
.nav-sub-item:hover { background: #F6F6F6; color: #111111; }
.nav-sub-item.active { color: #0095FF; font-weight: 500; background: #EFF6FF; }
.sidebar-bottom { padding: 12px 12px 16px; border-top: 1px solid #EDF2F6; display: flex; flex-direction: column; gap: 2px; }
.sidebar-section-title { font-size: 11px; font-weight: 500; color: #A098AE; letter-spacing: .91px; padding: 4px 12px 8px; text-transform: uppercase; }
.main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { height: 64px; background: #fff; border-bottom: 1px solid #EDF2F6; display: flex; align-items: center; justify-content: flex-end; padding: 0 24px; gap: 10px; flex-shrink: 0; }
.topbar-notif-btn { background: none; border: 1px solid #EDF2F6; border-radius: 8px; padding: 8px; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; }
.topbar-notif-btn:hover { background: #F6F6F6; }
.notif-badge { position: absolute; top: -4px; right: -4px; background: #0095FF; color: #fff; font-size: 10px; font-weight: 700; border-radius: 9999px; min-width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; padding: 0 3px; }
.topbar-branch-btn { display: flex; align-items: center; gap: 6px; padding: 7px 14px; border: 1px solid #E0E0E0; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: 500; color: #111; background: #fff; position: relative; user-select: none; }
.topbar-branch-btn:hover { background: #F6F6F6; }
.topbar-admin-btn { display: flex; align-items: center; gap: 8px; padding: 5px 10px 5px 5px; border: 1px solid #EDF2F6; border-radius: 8px; cursor: pointer; background: #fff; position: relative; user-select: none; }
.topbar-admin-btn:hover { background: #F6F6F6; }
.user-avatar-sm { width: 28px; height: 28px; border-radius: 50%; background: #E8E8E8; color: #505050; font-size: 12px; font-weight: 600; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.admin-info { display: flex; flex-direction: column; gap: 1px; }
.admin-name { font-size: 13px; font-weight: 600; color: #111; line-height: 1.2; }
.admin-role-text { font-size: 11px; color: #767676; line-height: 1.2; }
.tb-dropdown { display: none; position: absolute; top: calc(100% + 6px); right: 0; background: #fff; border: 1px solid #EDF2F6; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.10); min-width: 140px; z-index: 200; overflow: hidden; }
.tb-dropdown.open { display: block; }
.tb-dd-item { padding: 10px 14px; font-size: 13px; color: #333; cursor: pointer; }
.tb-dd-item:hover { background: #F6F6F6; }
.tb-dd-item.active { color: #0095FF; font-weight: 600; }
.tb-dd-logout { color: #EC3D3D; }
.page-content { flex: 1; overflow-y: auto; padding: 28px; }
.badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.badge-success { background: #E6FBF4; color: #00B377; }
.badge-warning { background: #FEF6E6; color: #E0A830; }
.badge-primary { background: #E6F4FF; color: #0077CC; }
.badge-gray { background: #F0F0F0; color: #505050; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
.btn-primary { background: #0095FF; color: #fff; }
.btn-outline { background: #fff; color: #505050; border: 1px solid #EDF2F6; }
.btn-danger { background: #EC3D3D; color: #fff; }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 4px; }

/* Page header */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.page-title { font-size: 24px; font-weight: 500; color: #111; }

/* Product grid */
.product-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.product-card { background: #fff; border-radius: 20px; box-shadow: 0 4px 20px rgba(238,238,238,.5); padding: 20px; display: flex; flex-direction: column; gap: 12px; }
.product-card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.product-name { font-size: 15px; font-weight: 600; color: #111; }
.product-price { font-size: 20px; font-weight: 700; color: #0095FF; font-weight: 500; }
.product-price span { font-size: 12px; font-weight: 400; color: #767676; }
.product-meta { display: flex; flex-direction: column; gap: 6px; }
.product-meta-row { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #505050; }
.product-meta-row svg { flex-shrink: 0; }
.product-divider { border: none; border-top: 1px solid #EDF2F6; margin: 0; }
.product-footer { display: flex; align-items: center; justify-content: space-between; }
.toggle-wrap { display: flex; align-items: center; gap: 6px; font-size: 12px; color: #505050; }
.toggle { position: relative; width: 36px; height: 20px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider { position: absolute; inset: 0; background: #DDD; border-radius: 20px; cursor: pointer; transition: background .2s; }
.toggle-slider::before { content: ''; position: absolute; width: 14px; height: 14px; background: #fff; border-radius: 9999px; top: 3px; left: 3px; transition: transform .2s; }
.toggle input:checked + .toggle-slider { background: #0095FF; }
.toggle input:checked + .toggle-slider::before { transform: translateX(16px); }
.product-actions { display: flex; gap: 6px; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 999; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: #fff; border-radius: 20px; padding: 28px; width: 480px; max-width: 90vw; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 18px; font-weight: 500; margin-bottom: 20px; }
.modal-close { float: right; background: none; border: none; font-size: 18px; cursor: pointer; color: #767676; }
.form-group { margin-bottom: 16px; }
.form-label { font-size: 12px; font-weight: 500; color: #505050; margin-bottom: 6px; display: block; }
.form-input { width: 100%; height: 42px; border: 1px solid #EDF2F6; border-radius: 8px; padding: 0 12px; font-size: 13px; outline: none; }
.form-input:focus { border-color: #0095FF; font-weight: 500; }
.form-select { width: 100%; height: 42px; border: 1px solid #EDF2F6; border-radius: 8px; padding: 0 12px; font-size: 13px; background: #fff; outline: none; }
.form-select:focus { border-color: #0095FF; font-weight: 500; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.card-title { font-size: 16px; font-weight: 500; color: #111111; margin-bottom: 4px; }
.card-sub { font-size: 12px; color: #767676; }
.btn-danger { background: #EC3D3D; color: #fff; }
.badge-gray { background: #F0F0F0; color: #505050; }

.stat-value { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 500; color: #111111; margin-bottom: 6px; }
.nav-group-trigger.open .nav-arrow { transform: rotate(180deg); }
.nav-arrow { transition: transform .2s; display: inline-block; }
</style>
</head>

    </div>

<script>
const STORAGE_KEY = 'vrink_branch_membership';

const DEFAULT_PRODUCTS = [
  { id: 1, name: '구독 30잔',       type: '구독제',    price: 59000, provide: '30잔/월', gift: false, active: true },
  { id: 2, name: '기능샷 10잔권',   type: '한잔권',    price: 45000, provide: '10잔',    gift: true,  active: true },
  { id: 3, name: '7일 자유이용권',  type: '자유이용권', price: 49000, provide: '7일 무제한', gift: false, active: true },
  { id: 4, name: '구독 50잔',       type: '구독제',    price: 89000, provide: '50잔/월', gift: false, active: true },
  { id: 5, name: '맛샷 5잔권',      type: '한잔권',    price: 75000, provide: '5잔',     gift: true,  active: true },
];

let products = loadProducts();
let editingId = null;
let nextId = Math.max(...products.map(p => p.id)) + 1;

function loadProducts() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    return saved ? JSON.parse(saved) : [...DEFAULT_PRODUCTS];
  } catch(e) {
    return [...DEFAULT_PRODUCTS];
  }
}

function saveProducts() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(products));
}

function typeBadge(type) {
  if (type === '구독제')    return `<span class="badge badge-primary">${type}</span>`;
  if (type === '한잔권')    return `<span class="badge badge-warning">${type}</span>`;
  if (type === '자유이용권') return `<span class="badge badge-success">${type}</span>`;
  return `<span class="badge badge-gray">${type}</span>`;
}

function priceUnit(type) {
  return type === '구독제' ? '/월' : '';
}

function renderGrid() {
  const grid = document.getElementById('productGrid');
  grid.innerHTML = products.map(p => `
    <div class="product-card" id="card-${p.id}">
      <div class="product-card-header">
        <div>
          <div class="product-name">${p.name}</div>
          <div style="margin-top:6px;">${typeBadge(p.type)}</div>
        </div>
      </div>
      <div class="product-price">${p.price.toLocaleString()}원<span>${priceUnit(p.type)}</span></div>
      <div class="product-meta">
        <div class="product-meta-row">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#0095FF" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          ${p.provide}
        </div>
        ${p.gift ? `<div class="product-meta-row"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#00B377" stroke-width="2"><polyline points="20 12 20 22 4 22 4 12"/><rect x="2" y="7" width="20" height="5"/><path d="M12 22V7"/><path d="M12 7H7.5a2.5 2.5 0 010-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 000-5C13 2 12 7 12 7z"/></svg>선물하기 가능</div>` : ''}
      </div>
      <hr class="product-divider">
      <div class="product-footer">
        <div class="toggle-wrap">
          <label class="toggle">
            <input type="checkbox" ${p.active ? 'checked' : ''} onchange="toggleActive(${p.id}, this.checked)">
            <span class="toggle-slider"></span>
          </label>
          <span>${p.active ? '판매중' : '판매중지'}</span>
        </div>
        <div class="product-actions">
          <button class="btn btn-outline btn-sm" onclick="openEditModal(${p.id})">수정</button>
          <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">삭제</button>
        </div>
      </div>
    </div>
  `).join('');
}

function toggleActive(id, checked) {
  const p = products.find(x => x.id === id);
  if (p) {
    p.active = checked;
    saveProducts();
    renderGrid();
  }
}

function deleteProduct(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  if (!confirm(`"${p.name}" 상품을 삭제하시겠습니까?`)) return;
  products = products.filter(x => x.id !== id);
  saveProducts();
  renderGrid();
}

function openAddModal() {
  editingId = null;
  document.getElementById('modalTitle').textContent = '상품 추가';
  document.getElementById('fName').value = '';
  document.getElementById('fType').value = '구독제';
  document.getElementById('fPrice').value = '';
  document.getElementById('fProvide').value = '';
  document.getElementById('fGift').checked = false;
  document.getElementById('fActive').value = '1';
  updateProvideLabel();
  document.getElementById('productModal').classList.add('open');
}

function openEditModal(id) {
  editingId = id;
  const p = products.find(x => x.id === id);
  if (!p) return;
  document.getElementById('modalTitle').textContent = '상품 수정';
  document.getElementById('fName').value = p.name;
  document.getElementById('fType').value = p.type;
  document.getElementById('fPrice').value = p.price;
  document.getElementById('fProvide').value = p.provide;
  document.getElementById('fGift').checked = p.gift;
  document.getElementById('fActive').value = p.active ? '1' : '0';
  updateProvideLabel();
  document.getElementById('productModal').classList.add('open');
}

function closeProductModal() {
  document.getElementById('productModal').classList.remove('open');
}

function updateProvideLabel() {
  const type = document.getElementById('fType').value;
  const label = document.getElementById('fProvideLabel');
  const giftWrap = document.getElementById('fGiftWrap');
  if (type === '자유이용권') {
    label.textContent = '제공 기간';
    document.getElementById('fProvide').placeholder = '예: 7일 무제한';
    giftWrap.style.display = 'none';
  } else if (type === '한잔권') {
    label.textContent = '제공 잔수';
    document.getElementById('fProvide').placeholder = '예: 10잔';
    giftWrap.style.display = 'block';
  } else {
    label.textContent = '제공 잔수';
    document.getElementById('fProvide').placeholder = '예: 30잔/월';
    giftWrap.style.display = 'none';
  }
}

document.getElementById('fType').addEventListener('change', updateProvideLabel);

function saveProduct() {
  const name    = document.getElementById('fName').value.trim();
  const type    = document.getElementById('fType').value;
  const price   = parseInt(document.getElementById('fPrice').value, 10);
  const provide = document.getElementById('fProvide').value.trim();
  const gift    = document.getElementById('fGift').checked;
  const active  = document.getElementById('fActive').value === '1';

  if (!name)           { alert('상품명을 입력해주세요.'); return; }
  if (isNaN(price))    { alert('가격을 입력해주세요.'); return; }
  if (!provide)        { alert('제공 잔수/기간을 입력해주세요.'); return; }

  if (editingId !== null) {
    const p = products.find(x => x.id === editingId);
    Object.assign(p, { name, type, price, provide, gift, active });
  } else {
    products.push({ id: nextId++, name, type, price, provide, gift, active });
  }

  saveProducts();
  renderGrid();
  closeProductModal();
}

function toggleGroup(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('show');
}

document.getElementById('productModal').addEventListener('click', function(e) {
  if (e.target === this) closeProductModal();
});

renderGrid();
function toggleTBDrop(id) {
  document.querySelectorAll('.tb-dropdown').forEach(d => { if(d.id !== id) d.classList.remove('open'); });
  document.getElementById(id).classList.toggle('open');
}
document.addEventListener('click', function(e) {
  if(!e.target.closest('.topbar-branch-btn') && !e.target.closest('.topbar-admin-btn')) {
    document.querySelectorAll('.tb-dropdown').forEach(d => d.classList.remove('open'));
  }
});
</script>
<script>(function(){if(!sessionStorage.getItem('branchAuth')){location.href='branch-login.html';}})()</script>
<script src="branch-common.js"></script>
</body>
</html>
