<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>브링크 지점관리 - 회원 관리</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+KR:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Inter', 'Noto Sans KR', sans-serif; background: #F8F8FA; color: #111111; display: flex; height: 100vh; overflow: hidden; }
.sidebar { width: 256px; min-width: 256px; height: 100vh; background: #fff; border-right: 1px solid rgba(0,0,0,.1); display: flex; flex-direction: column; overflow-y: auto; flex-shrink: 0; }
.sidebar-logo { padding: 20px 20px 16px; border-bottom: 1px solid #EDF2F6; display:flex; align-items:center; gap:8px; cursor:pointer; }
.sidebar-nav { flex: 1; padding: 12px; display: flex; flex-direction: column; gap: 2px; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; text-decoration: none; color: #505050; font-size: 14px; font-weight: 500; cursor: pointer; transition: background .15s; }
.nav-item:hover { background: #F6F6F6; }
.nav-item.active { background: #EFF6FF; color: #0095FF; font-weight: 500; }
.nav-item.nav-logout { color: #EC3D3D; }
.nav-icon { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.nav-label { flex: 1; }
.nav-group { display: flex; flex-direction: column; }
.nav-group-trigger { display: flex; align-items: center; gap: 10px; padding: 9px 12px; border-radius: 8px; color: #505050; font-size: 14px; font-weight: 500; cursor: pointer; }
.nav-group-trigger:hover,.nav-group-trigger.open { background: #F6F6F6; }
.nav-arrow { margin-left: auto; font-size: 10px; color: #767676; }
.nav-sub { display: none; flex-direction: column; padding-left: 32px; gap: 1px; }
.nav-sub.show { display: flex; }
.nav-sub-item { padding: 7px 12px; border-radius: 6px; font-size: 13px; color: #505050; text-decoration: none; font-weight: 400; }
.nav-sub-item:hover { background: #F6F6F6; color: #111111; }
.nav-sub-item.active { color: #0095FF; font-weight: 500; background: #EFF6FF; }
.sidebar-bottom { padding: 12px 12px 16px; border-top: 1px solid #EDF2F6; display: flex; flex-direction: column; gap: 2px; }
.sidebar-section-title { font-size: 11px; font-weight: 500; color: #A098AE; letter-spacing: .91px; padding: 4px 12px 8px; text-transform: uppercase; }
.main-wrapper { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { height: 64px; background: #fff; border-bottom: 1px solid #EDF2F6; display: flex; align-items: center; justify-content: flex-end; padding: 0 24px; gap: 12px; flex-shrink: 0; }
.topbar-btn { background: none; border: 1px solid #EDF2F6; border-radius: 8px; padding: 8px; cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; }
.notif-badge { position: absolute; top: -4px; right: -4px; background: #0095FF; color: #fff; font-size: 10px; font-weight: 500; border-radius: 9999px; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; }
.topbar-user { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 8px; border-radius: 8px; }
.topbar-user:hover { background: #F6F6F6; }
.user-avatar { width: 32px; height: 32px; background: #EDF2F6; border-radius: 9999px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 500; color: #505050; }
.user-name { font-size: 13px; font-weight: 500; color: #111; }
.user-role { font-size: 11px; color: #767676; }
.page-content { flex: 1; overflow-y: auto; padding: 28px; }
.page-title { font-size: 24px; font-weight: 500; color: #111; margin-bottom: 20px; }
.badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.badge-success { background: #E6FBF4; color: #00B377; }
.badge-warning { background: #FEF6E6; color: #E0A830; }
.badge-primary { background: #E6F4FF; color: #0077CC; }
.badge-gray { background: #F0F0F0; color: #505050; }
.btn { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 6px; font-size: 13px; font-weight: 500; cursor: pointer; border: none; }
.btn-primary { background: #0095FF; color: #fff; }
.btn-outline { background: #fff; color: #505050; border: 1px solid #EDF2F6; }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 4px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { padding: 10px 12px; background: #FAFAFA; border-bottom: 1px solid #EDF2F6; font-weight: 500; color: #767676; text-align: left; font-size: 12px; }
tbody td { padding: 12px; border-bottom: 1px solid #EDF2F6; vertical-align: middle; }
tbody tr:last-child td { border-bottom: none; }
tbody tr:hover td { background: #FAFAFA; }
.table-wrap { background: #fff; border-radius: 20px; box-shadow: 0 4px 20px rgba(238,238,238,.5); overflow: hidden; }

/* Stat cards */
.stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; margin-bottom: 20px; }
.stat-card { background: #fff; border-radius: 20px; box-shadow: 0 4px 20px rgba(238,238,238,.5); padding: 20px 24px; }
.stat-label { font-size: 12px; color: #767676; margin-bottom: 8px; }
.stat-value { font-size: 28px; font-weight: 600; color: #111; }
.stat-unit { font-size: 14px; font-weight: 400; color: #767676; margin-left: 4px; }

/* Modal */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 999; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal-box { background: #fff; border-radius: 20px; padding: 28px; width: 480px; max-width: 90vw; max-height: 90vh; overflow-y: auto; }
.modal-title { font-size: 18px; font-weight: 500; margin-bottom: 20px; }
.modal-close { float: right; background: none; border: none; font-size: 18px; cursor: pointer; color: #767676; }
.info-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #EDF2F6; font-size: 13px; }
.info-row:last-child { border-bottom: none; }
.info-key { width: 100px; color: #767676; flex-shrink: 0; }
.info-val { color: #111; font-weight: 500; }
.modal-footer { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

.card-title { font-size: 16px; font-weight: 500; color: #111111; margin-bottom: 4px; }
.card-sub { font-size: 12px; color: #767676; }
.btn-danger { background: #EC3D3D; color: #fff; }
.badge-gray { background: #F0F0F0; color: #505050; }
.user-info { display: flex; flex-direction: column; }
.stat-value { font-family: 'Poppins', sans-serif; font-size: 22px; font-weight: 500; color: #111111; margin-bottom: 6px; }
.nav-group-trigger.open .nav-arrow { transform: rotate(180deg); }
.nav-arrow { transition: transform .2s; display: inline-block; }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar">
  <div class="sidebar-logo" onclick="location.href='branch-index.html'">
    <img src="logo_spinner.png" alt="VRINK" style="height:28px;width:auto;">
    <span style="font-size:12px;font-weight:600;color:#0095FF;background:#EFF6FF;padding:2px 8px;border-radius:4px;">성수점</span>
  </div>
  <nav class="sidebar-nav">
    <a href="branch-index.html" class="nav-item">
      <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg></span>
      <span class="nav-label">홈</span>
    </a>
    <a href="branch-storefront.html" class="nav-item">
      <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.61L23 6H6"/></svg></span>
      <span class="nav-label">자사몰</span>
    </a>
    <a href="branch-inventory.html" class="nav-item">
      <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span>
      <span class="nav-label">재고 관리</span>
    </a>
    <div class="nav-group">
      <div class="nav-group-trigger" onclick="toggleGroup(this)">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg></span>
        <span class="nav-label">주문 / 매출</span>
        <span class="nav-arrow">▾</span>
      </div>
      <div class="nav-sub">
        <a href="branch-orders.html" class="nav-sub-item">주문 내역</a>
        <a href="branch-sales.html" class="nav-sub-item">종합 매출</a>
      </div>
    </div>
    <a href="branch-menu.html" class="nav-item">
      <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8h1a4 4 0 010 8h-1"/><path d="M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8z"/><line x1="6" y1="1" x2="6" y2="4"/><line x1="10" y1="1" x2="10" y2="4"/><line x1="14" y1="1" x2="14" y2="4"/></svg></span>
      <span class="nav-label">메뉴 설정</span>
    </a>
    <div class="nav-group">
      <div class="nav-group-trigger open" onclick="toggleGroup(this)">
        <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg></span>
        <span class="nav-label">회원·멤버십</span>
        <span class="nav-arrow">▾</span>
      </div>
      <div class="nav-sub show">
        <a href="branch-members.html" class="nav-sub-item active">회원</a>
        <a href="branch-membership.html" class="nav-sub-item">멤버십 상품</a>
      </div>
    </div>
  </nav>
  <div class="sidebar-bottom">
    <div class="sidebar-section-title">SETTINGS</div>
    <a href="branch-settings.html" class="nav-item">
      <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></span>
      <span class="nav-label">지점 설정</span>
    </a>
    <a href="branch-help.html" class="nav-item">
      <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span>
      <span class="nav-label">도움말</span>
    </a>
    <button class="nav-item nav-logout" style="background:none;border:none;width:100%;text-align:left;cursor:pointer;" onclick="if(confirm('로그아웃 하시겠습니까?')){sessionStorage.removeItem('branchAuth');location.href='branch-login.html';}">
      <span class="nav-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#EC3D3D" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></span>
      <span class="nav-label">로그아웃</span>
    </button>
  </div>
</aside>

<!-- Main -->
<div class="main-wrapper">
  <div class="topbar">
    <button class="topbar-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#505050" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <span class="notif-badge">2</span>
    </button>
    <div class="topbar-user">
      <div class="user-avatar">김</div>
      <div class="user-info">
        <div class="user-name">박지영</div>
        <div class="user-role">지점 관리자</div>
      </div>
    </div>
  </div>

  <div class="page-content">
    <div class="page-title">회원 관리</div>

    <!-- Stats -->
    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-label">전체 회원</div>
        <div class="stat-value">142<span class="stat-unit">명</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">활성 멤버십</div>
        <div class="stat-value">38<span class="stat-unit">명</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">이번달 신규</div>
        <div class="stat-value">5<span class="stat-unit">명</span></div>
      </div>
    </div>

    <!-- Table -->
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>이름</th>
            <th>연락처</th>
            <th>가입일</th>
            <th>멤버십</th>
            <th>잔여 횟수</th>
            <th>최근 이용일</th>
            <th>관리</th>
          </tr>
        </thead>
        <tbody id="memberTableBody"></tbody>
      </table>
    </div>
  </div>
</div>

<!-- Member Detail Modal -->
<div class="modal-overlay" id="memberModal">
  <div class="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-title">회원 상세 정보</div>
    <div id="modalContent"></div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">닫기</button>
    </div>
  </div>
</div>

<script>
const MEMBERS = [
  { name: '이서연', phone: '010-1234-5678', joinDate: '2025-08-14', membership: '구독 30잔', membershipType: '구독제', remaining: 18, lastUse: '2026-03-29' },
  { name: '박준혁', phone: '010-2345-6789', joinDate: '2025-11-02', membership: '기능샷 10잔권', membershipType: '한잔권', remaining: 4, lastUse: '2026-03-28' },
  { name: '김민지', phone: '010-3456-7890', joinDate: '2026-01-15', membership: '없음', membershipType: null, remaining: null, lastUse: '2026-03-20' },
  { name: '최도윤', phone: '010-4567-8901', joinDate: '2025-06-30', membership: '구독 50잔', membershipType: '구독제', remaining: 33, lastUse: '2026-03-30' },
  { name: '정하은', phone: '010-5678-9012', joinDate: '2026-02-03', membership: '7일 자유이용권', membershipType: '자유이용권', remaining: null, lastUse: '2026-03-27' },
  { name: '한지우', phone: '010-6789-0123', joinDate: '2025-09-22', membership: '없음', membershipType: null, remaining: null, lastUse: '2026-03-15' },
  { name: '오승현', phone: '010-7890-1234', joinDate: '2025-12-11', membership: '기능샷 10잔권', membershipType: '한잔권', remaining: 9, lastUse: '2026-03-30' },
  { name: '윤나연', phone: '010-8901-2345', joinDate: '2026-03-05', membership: '구독 30잔', membershipType: '구독제', remaining: 27, lastUse: '2026-03-29' },
  { name: '임태민', phone: '010-9012-3456', joinDate: '2026-03-18', membership: '없음', membershipType: null, remaining: null, lastUse: '2026-03-18' },
  { name: '송예린', phone: '010-0123-4567', joinDate: '2025-07-08', membership: '맛샷 5잔권', membershipType: '한잔권', remaining: 2, lastUse: '2026-03-26' },
];

function membershipBadge(type) {
  if (type === '구독제')    return `<span class="badge badge-primary">${type}</span>`;
  if (type === '한잔권')    return `<span class="badge badge-warning">${type}</span>`;
  if (type === '자유이용권') return `<span class="badge badge-success">${type}</span>`;
  return `<span class="badge badge-gray">없음</span>`;
}

function renderMembers() {
  const tbody = document.getElementById('memberTableBody');
  tbody.innerHTML = MEMBERS.map((m, i) => `
    <tr>
      <td style="font-weight:500;">${m.name}</td>
      <td style="color:#505050;">${m.phone}</td>
      <td style="color:#767676;font-size:12px;">${m.joinDate}</td>
      <td>${m.membershipType ? membershipBadge(m.membershipType) : '<span class="badge badge-gray">없음</span>'}</td>
      <td>${m.remaining !== null ? `<strong>${m.remaining}</strong>잔` : (m.membershipType === '자유이용권' ? '무제한' : '<span style="color:#CCC">-</span>')}</td>
      <td style="color:#767676;font-size:12px;">${m.lastUse}</td>
      <td><button class="btn btn-outline btn-sm" onclick="openModal(${i})">상세보기</button></td>
    </tr>
  `).join('');
}

function openModal(idx) {
  const m = MEMBERS[idx];
  const remainingText = m.remaining !== null ? `${m.remaining}잔` : (m.membershipType === '자유이용권' ? '무제한' : '-');
  document.getElementById('modalContent').innerHTML = `
    <div class="info-row"><span class="info-key">이름</span><span class="info-val">${m.name}</span></div>
    <div class="info-row"><span class="info-key">연락처</span><span class="info-val">${m.phone}</span></div>
    <div class="info-row"><span class="info-key">가입일</span><span class="info-val">${m.joinDate}</span></div>
    <div class="info-row"><span class="info-key">멤버십</span><span class="info-val">${m.membership}</span></div>
    <div class="info-row"><span class="info-key">멤버십 유형</span><span class="info-val">${m.membershipType ? membershipBadge(m.membershipType) : '<span class="badge badge-gray">없음</span>'}</span></div>
    <div class="info-row"><span class="info-key">잔여 횟수</span><span class="info-val">${remainingText}</span></div>
    <div class="info-row"><span class="info-key">최근 이용일</span><span class="info-val">${m.lastUse}</span></div>
  `;
  document.getElementById('memberModal').classList.add('open');
}

function closeModal() {
  document.getElementById('memberModal').classList.remove('open');
}

function toggleGroup(el) {
  el.classList.toggle('open');
  el.nextElementSibling.classList.toggle('show');
}

document.getElementById('memberModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

renderMembers();
</script>
</body>
</html>
